<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga - Family Tree</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-30%, -30%) rotate(180deg); }
        }

        /* Header */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
        }

        .stat-icon.blue { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .stat-icon.pink { background: rgba(236, 72, 153, 0.2); color: var(--secondary); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.2); color: var(--accent); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .view-btn {
            padding: 12px 24px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: var(--primary);
            color: white;
        }

        .view-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        /* Tree View Container */
        .tree-container {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            overflow-x: auto;
            min-height: 600px;
            position: relative;
        }

        /* CSS Tree Structure */
        .tree {
            display: flex;
            justify-content: center;
        }

        .tree ul {
            padding-top: 40px;
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
        }

        .tree li {
            float: left;
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 40px 10px 0 10px;
            transition: all 0.5s;
        }

        /* Connectors */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 3px solid var(--primary);
            width: 50%;
            height: 40px;
            opacity: 0.6;
        }

        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 3px solid var(--primary);
        }

        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }

        .tree li:only-child {
            padding-top: 0;
        }

        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }

        .tree li:last-child::before {
            border-right: 3px solid var(--primary);
            border-radius: 0 15px 0 0;
        }

        .tree li:first-child::after {
            border-radius: 15px 0 0 0;
        }

        .tree ul ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 3px solid var(--primary);
            width: 0;
            height: 40px;
            opacity: 0.6;
        }

        /* Person Card */
        .person-card {
            display: inline-block;
            background: linear-gradient(145deg, var(--bg-card), #252f47);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-width: 200px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .person-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
            z-index: 10;
        }

        .person-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            overflow: hidden;
        }

        .person-avatar.male {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .person-avatar.female {
            background: linear-gradient(135deg, #ec4899, #be185d);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .person-avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .person-card:hover .person-avatar::before {
            animation: shine 0.5s ease-in-out;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .person-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .person-role {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .person-age {
            display: inline-block;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Spouse Tag */
        .spouse-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            padding: 6px 12px;
            background: rgba(236, 72, 153, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .spouse-tag:hover {
            background: rgba(236, 72, 153, 0.3);
            transform: scale(1.05);
        }

        .spouse-tag.male-spouse {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        /* Action Buttons on Card */
        .card-actions {
            position: absolute;
            top: -15px;
            right: -15px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: all 0.3s;
        }

        .person-card:hover .card-actions {
            opacity: 1;
        }

        .card-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-btn.add {
            background: var(--success);
            color: white;
        }

        .card-btn.edit {
            background: var(--accent);
            color: white;
        }

        .card-btn.delete {
            background: var(--danger);
            color: white;
        }

        .card-btn:hover {
            transform: scale(1.2);
        }

        /* List View */
        .list-view {
            display: none;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
        }

        .list-view.active {
            display: block;
        }

        .family-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .family-member-card {
            background: linear-gradient(145deg, var(--bg-card), #252f47);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        .family-member-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .member-avatar-list {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .member-avatar-list.male {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }

        .member-avatar-list.female {
            background: linear-gradient(135deg, #ec4899, #be185d);
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .member-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .member-actions {
            display: flex;
            gap: 8px;
        }

        .member-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--border);
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .member-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: linear-gradient(145deg, var(--bg-card), #0f172a);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.4s;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .gender-selector {
            display: flex;
            gap: 12px;
        }

        .gender-option {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(15, 23, 42, 0.3);
        }

        .gender-option:hover {
            border-color: var(--primary);
        }

        .gender-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .gender-option.selected.male {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
        }

        .gender-option.selected.female {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.2);
        }

        .gender-option i {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-full {
            flex: 1;
            justify-content: center;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px 16px 56px;
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }

            .tree-container {
                padding: 1rem;
            }

            .person-card {
                min-width: 150px;
                padding: 15px;
            }

            .person-avatar {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: linear-gradient(135deg, var(--danger), #dc2626);
        }

        /* Generation Badge */
        .gen-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-tree"></i>
            <span>Silsilah Keluarga</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="exportData()">
                <i class="fas fa-download"></i> Export
            </button>
            <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">
                <i class="fas fa-upload"></i> Import
            </button>
            <input type="file" id="import-file" style="display: none" accept=".json" onchange="importData(this)">
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Tambah Anggota
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total Anggota</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pink"><i class="fas fa-female"></i></div>
                <div class="stat-number" id="stat-female">0</div>
                <div class="stat-label">Perempuan</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-male"></i></div>
                <div class="stat-number" id="stat-male">0</div>
                <div class="stat-label">Laki-laki</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-layer-group"></i></div>
                <div class="stat-number" id="stat-gen">0</div>
                <div class="stat-label">Generasi</div>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" placeholder="Cari anggota keluarga..." id="search-input" oninput="searchMembers(this.value)">
        </div>

        <!-- View Toggle -->
        <div class="view-toggle">
            <button class="view-btn active" onclick="switchView('tree')">
                <i class="fas fa-sitemap"></i> Pohon Keluarga
            </button>
            <button class="view-btn" onclick="switchView('list')">
                <i class="fas fa-list"></i> Daftar Anggota
            </button>
        </div>

        <!-- Tree View -->
        <div class="tree-container" id="tree-view">
            <div class="tree" id="family-tree">
                <!-- Tree content generated by JS -->
            </div>
        </div>

        <!-- List View -->
        <div class="list-view" id="list-view">
            <div class="family-grid" id="family-list">
                <!-- List content generated by JS -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="member-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-user-plus"></i>
                    <span id="modal-title">Tambah Anggota Keluarga</span>
                </div>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="member-form">
                    <input type="hidden" id="member-id">
                    <input type="hidden" id="parent-id">
                    
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-input" id="member-name" placeholder="Masukkan nama lengkap" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis Kelamin</label>
                        <div class="gender-selector">
                            <div class="gender-option male" onclick="selectGender('male')">
                                <i class="fas fa-mars"></i>
                                <div>Laki-laki</div>
                            </div>
                            <div class="gender-option female" onclick="selectGender('female')">
                                <i class="fas fa-venus"></i>
                                <div>Perempuan</div>
                            </div>
                        </div>
                        <input type="hidden" id="member-gender" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Peran dalam Keluarga</label>
                        <select class="form-select" id="member-role">
                            <option value="Kepala Keluarga">Kepala Keluarga</option>
                            <option value="Ibu">Ibu</option>
                            <option value="Ayah">Ayah</option>
                            <option value="Anak">Anak</option>
                            <option value="Menantu">Menantu</option>
                            <option value="Cucu">Cucu</option>
                            <option value="Cicit">Cicit</option>
                            <option value="Kakek">Kakek</option>
                            <option value="Nenek">Nenek</option>
                            <option value="Paman">Paman</option>
                            <option value="Bibi">Bibi</option>
                            <option value="Sepupu">Sepupu</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tahun Lahir (Opsional)</label>
                        <input type="number" class="form-input" id="member-birth" placeholder="Contoh: 1980" min="1900" max="2026">
                    </div>

                    <div class="form-group" id="spouse-group" style="display: none;">
                        <label class="form-label">Nama Pasangan (Suami/Istri)</label>
                        <input type="text" class="form-input" id="member-spouse" placeholder="Nama pasangan (opsional)">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Orang Tua (Opsional)</label>
                        <select class="form-select" id="member-parent">
                            <option value="">-- Pilih Orang Tua --</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary btn-full" onclick="saveMember()">
                    <i class="fas fa-save"></i> Simpan
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message">Operasi berhasil!</span>
    </div>

    <script>
        // Data Management
        let familyData = JSON.parse(localStorage.getItem('familyData')) || {
            id: 1,
            name: "Kepala Keluarga",
            gender: "male",
            role: "Kepala Keluarga",
            birthYear: "",
            spouse: null,
            children: []
        };

        let currentView = 'tree';
        let editingId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTree();
            updateStats();
            populateParentSelect();
        });

        // Render Tree View
        function renderTree() {
            const container = document.getElementById('family-tree');
            container.innerHTML = generateTreeHTML(familyData, 1);
        }

        function generateTreeHTML(node, generation) {
            const spouseHTML = node.spouse ? 
                `<div class="spouse-tag ${node.spouseGender || 'female'}" onclick="event.stopPropagation(); editSpouse(${node.id})">
                    <i class="fas fa-heart"></i> ${node.spouse}
                 </div>` : '';
            
            const genderClass = node.gender === 'male' ? 'male' : 'female';
            const icon = node.gender === 'male' ? 'fa-user-tie' : 'fa-user';
            
            let html = `
                <div class="person-card" onclick="selectMember(${node.id})">
                    ${generation > 1 ? `<div class="gen-badge">${generation}</div>` : ''}
                    <div class="card-actions">
                        <button class="card-btn add" onclick="event.stopPropagation(); openAddModal(${node.id})" title="Tambah Anak">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="card-btn edit" onclick="event.stopPropagation(); editMember(${node.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        ${node.id !== 1 ? `
                        <button class="card-btn delete" onclick="event.stopPropagation(); deleteMember(${node.id})" title="Hapus">
                            <i class="fas fa-trash"></i>
                        </button>` : ''}
                    </div>
                    <div class="person-avatar ${genderClass}">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div class="person-name">${node.name}</div>
                    <div class="person-role">${node.role}</div>
                    ${node.birthYear ? `<div class="person-age">${new Date().getFullYear() - node.birthYear} tahun</div>` : ''}
                    ${spouseHTML}
                </div>
            `;

            if (node.children && node.children.length > 0) {
                html += '<ul>';
                node.children.forEach(child => {
                    html += `<li>${generateTreeHTML(child, generation + 1)}</li>`;
                });
                html += '</ul>';
            }

            return `<ul><li>${html}</li></ul>`;
        }

        // Render List View
        function renderList() {
            const container = document.getElementById('family-list');
            const members = flattenData(familyData);
            
            if (members.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-users-slash"></i>
                        <h3>Belum ada data</h3>
                        <p>Tambahkan anggota keluarga untuk memulai</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = members.map(member => `
                <div class="family-member-card" onclick="editMember(${member.id})">
                    <div class="member-avatar-list ${member.gender}">
                        <i class="fas ${member.gender === 'male' ? 'fa-user-tie' : 'fa-user'}"></i>
                    </div>
                    <div class="member-info">
                        <div class="member-name">${member.name}</div>
                        <div class="member-meta">
                            ${member.role} • ${member.gender === 'male' ? 'Laki-laki' : 'Perempuan'}
                            ${member.birthYear ? ` • ${new Date().getFullYear() - member.birthYear} tahun` : ''}
                        </div>
                    </div>
                    <div class="member-actions" onclick="event.stopPropagation()">
                        <button class="member-btn" onclick="openAddModal(${member.id})" title="Tambah Anak">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="member-btn" onclick="editMember(${member.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        ${member.id !== 1 ? `
                        <button class="member-btn" onclick="deleteMember(${member.id})" title="Hapus" style="color: var(--danger);">
                            <i class="fas fa-trash"></i>
                        </button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Helper Functions
        function flattenData(node, result = []) {
            result.push(node);
            if (node.children) {
                node.children.forEach(child => flattenData(child, result));
            }
            return result;
        }

        function findNode(node, id) {
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const found = findNode(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParent(node, id, parent = null) {
            if (node.id === id) return parent;
            if (node.children) {
                for (let child of node.children) {
                    const found = findParent(child, id, node);
                    if (found) return found;
                }
            }
            return null;
        }

        function generateId() {
            return Date.now() + Math.random().toString(36).substr(2, 9);
        }

        // CRUD Operations
        function openAddModal(parentId = null) {
            editingId = null;
            document.getElementById('member-form').reset();
            document.getElementById('modal-title').innerHTML = '<i class="fas fa-user-plus"></i> Tambah Anggota';
            document.getElementById('parent-id').value = parentId || '';
            document.getElementById('member-id').value = '';
            
            // Reset gender selection
            document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('member-gender').value = '';
            
            populateParentSelect(parentId);
            document.getElementById('member-modal').classList.add('active');
        }

        function editMember(id) {
            const member = findNode(familyData, id);
            if (!member) return;

            editingId = id;
            document.getElementById('modal-title').innerHTML = '<i class="fas fa-user-edit"></i> Edit Anggota';
            document.getElementById('member-id').value = id;
            document.getElementById('member-name').value = member.name;
            document.getElementById('member-role').value = member.role;
            document.getElementById('member-birth').value = member.birthYear || '';
            document.getElementById('member-spouse').value = member.spouse || '';
            
            selectGender(member.gender);
            
            const parent = findParent(familyData, id);
            populateParentSelect(parent ? parent.id : '');
            document.getElementById('member-parent').value = parent ? parent.id : '';
            
            document.getElementById('member-modal').classList.add('active');
        }

        function selectGender(gender) {
            document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('selected', 'male', 'female'));
            const selected = document.querySelector(`.gender-option.${gender}`);
            selected.classList.add('selected', gender);
            document.getElementById('member-gender').value = gender;
        }

        function saveMember() {
            const name = document.getElementById('member-name').value.trim();
            const gender = document.getElementById('member-gender').value;
            const role = document.getElementById('member-role').value;
            const birthYear = document.getElementById('member-birth').value;
            const spouse = document.getElementById('member-spouse').value.trim();
            const parentId = document.getElementById('member-parent').value;
            const id = document.getElementById('member-id').value;

            if (!name || !gender) {
                showToast('Nama dan jenis kelamin wajib diisi!', 'error');
                return;
            }

            const memberData = {
                id: id ? parseInt(id) : Date.now(),
                name,
                gender,
                role,
                birthYear: birthYear ? parseInt(birthYear) : null,
                spouse: spouse || null,
                spouseGender: gender === 'male' ? 'female' : 'male',
                children: []
            };

            if (editingId) {
                // Update existing
                const existing = findNode(familyData, editingId);
                memberData.children = existing.children;
                
                // Check if parent changed
                const oldParent = findParent(familyData, editingId);
                const newParent = parentId ? findNode(familyData, parseInt(parentId)) : null;
                
                if (oldParent && oldParent.id !== (newParent ? newParent.id : null)) {
                    // Remove from old parent
                    oldParent.children = oldParent.children.filter(c => c.id !== editingId);
                    // Add to new parent
                    if (newParent) {
                        newParent.children.push(memberData);
                    } else {
                        // Become root (not allowed for now)
                        showToast('Tidak dapat mengubah root keluarga!', 'error');
                        return;
                    }
                } else {
                    // Update in place
                    Object.assign(existing, memberData);
                }
                
                showToast('Data berhasil diperbarui!');
            } else {
                // Add new
                if (parentId) {
                    const parent = findNode(familyData, parseInt(parentId));
                    if (parent) {
                        parent.children = parent.children || [];
                        parent.children.push(memberData);
                    }
                } else {
                    // Add as sibling of root (not allowed)
                    showToast('Pilih orang tua untuk anggota baru!', 'error');
                    return;
                }
                showToast('Anggota baru berhasil ditambahkan!');
            }

            saveData();
            closeModal();
            refreshViews();
        }

        function deleteMember(id) {
            if (id === 1) {
                showToast('Kepala keluarga tidak dapat dihapus!', 'error');
                return;
            }

            if (!confirm('Apakah Anda yakin ingin menghapus anggota ini dan semua keturunannya?')) return;

            const parent = findParent(familyData, id);
            if (parent) {
                parent.children = parent.children.filter(c => c.id !== id);
                saveData();
                refreshViews();
                showToast('Anggota berhasil dihapus!');
            }
        }

        function editSpouse(memberId) {
            const member = findNode(familyData, memberId);
            const newSpouse = prompt('Masukkan nama pasangan:', member.spouse || '');
            if (newSpouse !== null) {
                member.spouse = newSpouse.trim() || null;
                saveData();
                refreshViews();
                showToast('Data pasangan diperbarui!');
            }
        }

        // UI Functions
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.view-btn').classList.add('active');
            
            if (view === 'tree') {
                document.getElementById('tree-view').style.display = 'block';
                document.getElementById('list-view').classList.remove('active');
                renderTree();
            } else {
                document.getElementById('tree-view').style.display = 'none';
                document.getElementById('list-view').classList.add('active');
                renderList();
            }
        }

        function selectMember(id) {
            // Highlight selected member
            document.querySelectorAll('.person-card').forEach(card => {
                card.style.borderColor = '';
                card.style.transform = '';
            });
            
            // Could add detail view here
        }

        function populateParentSelect(selectedId = '') {
            const select = document.getElementById('member-parent');
            const members = flattenData(familyData);
            
            select.innerHTML = '<option value="">-- Pilih Orang Tua --</option>';
            members.forEach(member => {
                const option = document.createElement('option');
                option.value = member.id;
                option.textContent = `${member.name} (${member.role})`;
                if (member.id === selectedId) option.selected = true;
                select.appendChild(option);
            });
        }

        function searchMembers(query) {
            if (!query) {
                refreshViews();
                return;
            }

            const lowerQuery = query.toLowerCase();
            const allMembers = flattenData(familyData);
            const matched = allMembers.filter(m => 
                m.name.toLowerCase().includes(lowerQuery) ||
                m.role.toLowerCase().includes(lowerQuery)
            );

            if (currentView === 'list') {
                const container = document.getElementById('family-list');
                container.innerHTML = matched.map(member => `
                    <div class="family-member-card" onclick="editMember(${member.id})">
                        <div class="member-avatar-list ${member.gender}">
                            <i class="fas ${member.gender === 'male' ? 'fa-user-tie' : 'fa-user'}"></i>
                        </div>
                        <div class="member-info">
                            <div class="member-name">${member.name}</div>
                            <div class="member-meta">${member.role}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateStats() {
            const members = flattenData(familyData);
            const male = members.filter(m => m.gender === 'male').length;
            const female = members.filter(m => m.gender === 'female').length;
            const generations = calculateGenerations(familyData);

            animateNumber('stat-total', members.length);
            animateNumber('stat-male', male);
            animateNumber('stat-female', female);
            animateNumber('stat-gen', generations);
        }

        function calculateGenerations(node, current = 1) {
            let max = current;
            if (node.children) {
                node.children.forEach(child => {
                    max = Math.max(max, calculateGenerations(child, current + 1));
                });
            }
            return max;
        }

        function animateNumber(id, target) {
            const el = document.getElementById(id);
            const start = parseInt(el.textContent);
            const duration = 1000;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeProgress);
                
                el.textContent = current;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        function refreshViews() {
            renderTree();
            renderList();
            updateStats();
            populateParentSelect();
        }

        function saveData() {
            localStorage.setItem('familyData', JSON.stringify(familyData));
        }

        function closeModal() {
            document.getElementById('member-modal').classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            const msg = document.getElementById('toast-message');
            
            msg.textContent = message;
            icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Export/Import
        function exportData() {
            const dataStr = JSON.stringify(familyData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `silsilah-keluarga-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Data berhasil diexport!');
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    familyData = data;
                    saveData();
                    refreshViews();
                    showToast('Data berhasil diimport!');
                } catch (err) {
                    showToast('Format file tidak valid!', 'error');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // Close modal on outside click
        document.getElementById('member-modal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
