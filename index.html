<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree Modern</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #000, #444);
    color: white;
    padding: 15px;
    text-align: center;
}

/* CONTAINER SCROLL */
#tree-container {
    width: 100%;
    height: 75vh;
    overflow: auto;
    background: #f9fafc;
    border-top: 3px solid #ddd;
}

/* TREE */
#tree {
    min-width: 1200px;
    height: 100%;
}

/* NODE STYLE */
.node rect {
    fill: white;
    stroke: #333;
    stroke-width: 1.5;
    rx: 12;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1));
}

.node text {
    font-size: 13px;
    font-weight: 500;
}

/* LINE */
line {
    stroke: #999;
    stroke-width: 1.5;
}

/* BUTTON */
.controls {
    text-align: center;
    padding: 10px;
    background: white;
}

button {
    margin: 5px;
    padding: 10px 14px;
    border: none;
    background: black;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

/* MENU */
.menu {
    position: absolute;
    background: white;
    border-radius: 10px;
    padding: 10px;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 999;
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
}
</style>
</head>

<body>

<header>
    <h2>Family Tree Modern</h2>
</header>

<div id="tree-container">
    <div id="tree"></div>
</div>

<div class="controls">
    <button onclick="saveData()">💾 Simpan</button>
    <button onclick="loadData()">📂 Load</button>
</div>

<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addSpouse()">👩 Pasangan</button>
    <button onclick="addChild()">👶 Anak</button>
    <button onclick="deleteNode()">❌ Hapus</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("tree")) || {
    name: "Ki. Adam",
    spouse: { name: "Ny. Agami" },
    children: []
};

let selected = null;

// CONVERT
function convert(p){
    let children=[];
    if(p.children){
        p.children.forEach(c=>children.push(convert(c)));
    }
    return {
        name: p.name + (p.spouse ? " & " + p.spouse.name : ""),
        ref: p,
        children: children
    };
}

// DRAW
function draw(){

    document.getElementById("tree").innerHTML="";

    const width = 1600;
    const height = 800;

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const root = d3.hierarchy(convert(data));

    const tree = d3.tree()
        .size([width - 200, height - 200])
        .separation(() => 1.8); // 🔥 jarak diperlebar

    tree(root);

    // garis
    svg.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d=>d.source.x+100)
        .attr("y1", d=>d.source.y+80)
        .attr("x2", d=>d.target.x+100)
        .attr("y2", d=>d.target.y+80);

    // node
    const node = svg.selectAll("g")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d=>`translate(${d.x+100},${d.y+80})`);

    node.append("rect")
        .attr("width",160)
        .attr("height",50)
        .attr("x",-80)
        .attr("y",-25);

    node.append("text")
        .attr("text-anchor","middle")
        .attr("dy",5)
        .text(d=>d.data.name);

    node.on("click",(event,d)=>{
        selected = d.data.ref;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX+"px";
        menu.style.top = event.pageY+"px";
        menu.style.display="block";

        event.stopPropagation();
    });

    document.body.onclick=()=>{
        document.getElementById("menu").style.display="none";
    }
}

// MENU ACTION
function editNode(){
    const n = prompt("Nama:", selected.name);
    if(n){ selected.name=n; draw(); }
}

function addSpouse(){
    const n = prompt("Nama pasangan:");
    if(!n) return;
    selected.spouse={name:n};
    draw();
}

function addChild(){
    const n = prompt("Nama anak:");
    if(!n) return;
    selected.children = selected.children || [];
    selected.children.push({name:n,children:[]});
    draw();
}

function deleteNode(){
    function remove(node,target){
        if(!node.children) return;
        node.children=node.children.filter(c=>c!==target);
        node.children.forEach(c=>remove(c,target));
    }
    if(selected===data){ alert("Tidak bisa hapus root!"); return; }
    remove(data,selected);
    draw();
}

// SAVE
function saveData(){
    localStorage.setItem("tree", JSON.stringify(data));
    alert("Tersimpan!");
}

function loadData(){
    const d = localStorage.getItem("tree");
    if(d){
        data = JSON.parse(d);
        draw();
    }
}

// INIT
draw();

</script>

</body>
</html>
