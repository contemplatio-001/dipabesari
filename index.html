<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree</title>

<!-- CDN STABIL -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
    text-align: center;
}

h2 {
    background: black;
    color: white;
    padding: 15px;
    margin: 0;
}

#tree {
    width: 100%;
    height: 80vh;
    background: white;
}

.menu {
    position: absolute;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    display: none;
    z-index: 999;
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
}
</style>
</head>

<body>

<h2>Family Tree Online</h2>

<div id="tree"></div>

<div id="menu" class="menu">
    <button onclick="editNode()">Edit</button>
    <button onclick="addChild()">Tambah Anak</button>
    <button onclick="deleteNode()">Hapus</button>
</div>

<script>

let data = {
    name: "Kepala Keluarga",
    children: []
};

let selected = null;

function draw() {

    document.getElementById("tree").innerHTML = "";

    const width = window.innerWidth;
    const height = 500;

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const root = d3.hierarchy(data);
    const tree = d3.tree().size([width - 50, height - 50]);

    tree(root);

    svg.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y)
        .attr("stroke", "black");

    const node = svg.selectAll("g")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`);

    node.append("circle")
        .attr("r", 20)
        .attr("fill", "white")
        .attr("stroke", "black");

    node.append("text")
        .text(d => d.data.name)
        .attr("text-anchor", "middle")
        .attr("dy", 5);

    node.on("click", (event, d) => {
        selected = d.data;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX + "px";
        menu.style.top = event.pageY + "px";
        menu.style.display = "block";

        event.stopPropagation();
    });

    document.body.onclick = () => {
        document.getElementById("menu").style.display = "none";
    };
}

function editNode(){
    const n = prompt("Nama:");
    if(n){
        selected.name = n;
        draw();
    }
}

function addChild(){
    const n = prompt("Nama anak:");
    if(!n) return;

    selected.children = selected.children || [];
    selected.children.push({name:n});

    draw();
}

function deleteNode(){

    function remove(node, target){
        if(!node.children) return;
        node.children = node.children.filter(c => c !== target);
        node.children.forEach(c => remove(c, target));
    }

    if(selected === data){
        alert("Tidak bisa hapus root!");
        return;
    }

    remove(data, selected);
    draw();
}

draw();

</script>

</body>
</html>
