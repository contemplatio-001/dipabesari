<script>

// DATA
let data = JSON.parse(localStorage.getItem("tree")) || {
    name: "Ki. Adam",
    gender: "M",
    spouses: [{ name: "Ny. Agami", gender: "F", children: [] }]
};

let selected = null;

// ZOOM
const svg = d3.select("#svg");
const g = svg.append("g");

svg.call(d3.zoom()
    .scaleExtent([0.5, 2])
    .on("zoom", (event) => {
        g.attr("transform", event.transform);
    })
);

// BUILD (🔥 FIX ANTI TUMPUK)
function build(person, depth=0, x=800, nodes=[], links=[]){

    const sx = 300; // jarak pasangan diperlebar
    const sy = 150;

    nodes.push({name: person.name, x, y: depth*sy, ref: person});

    if(person.spouses){
        person.spouses.forEach((sp,i)=>{

            const px = person.gender==="M"
                ? x + (i+1)*sx
                : x - (i+1)*sx;

            nodes.push({name: sp.name, x:px, y:depth*sy, ref: sp});

            // garis pasangan
            links.push({x1:x,y1:depth*sy,x2:px,y2:depth*sy});

            if(sp.children){

                const total = sp.children.length;

                // 🔥 posisi awal supaya rata tengah
                const startX = px - (total - 1) * 120;

                sp.children.forEach((c,j)=>{

                    const cx = startX + j * 240; // 🔥 jarak anak diperlebar

                    nodes.push({name:c.name,x:cx,y:(depth+1)*sy,ref:c});

                    links.push({
                        x1:px,
                        y1:depth*sy,
                        x2:cx,
                        y2:(depth+1)*sy
                    });

                    // rekursif
                    build(c, depth+2, cx, nodes, links);
                });
            }
        });
    }

    return {nodes,links};
}

// DRAW
function draw(){

    g.selectAll("*").remove();

    const graph = build(data);

    g.selectAll("line")
        .data(graph.links)
        .enter()
        .append("line")
        .attr("x1",d=>d.x1)
        .attr("y1",d=>d.y1)
        .attr("x2",d=>d.x2)
        .attr("y2",d=>d.y2);

    const node = g.selectAll("g.node")
        .data(graph.nodes)
        .enter()
        .append("g")
        .attr("class","node")
        .attr("transform",d=>`translate(${d.x},${d.y})`);

    node.append("rect")
        .attr("width",140)
        .attr("height",60)
        .attr("x",-70)
        .attr("y",-30);

    node.append("text")
        .attr("text-anchor","middle")
        .attr("dominant-baseline","middle")
        .text(d=>d.name);

    node.on("click",(e,d)=>{
        selected = d.ref;

        const menu = document.getElementById("menu");
        menu.style.left = e.clientX + "px";
        menu.style.top = e.clientY + "px";
        menu.style.display = "block";

        e.stopPropagation();
    });

    document.body.onclick = ()=>{
        document.getElementById("menu").style.display="none";
    }
}

// MENU (tetap sama)
function editNode(){
    const n = prompt("Nama:");
    if(n){ selected.name=n; draw(); }
}

function addHusband(){
    if(!selected.spouses) selected.spouses=[];
    const n = prompt("Nama suami:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"M", children:[]});
    draw();
}

function addWife(){
    if(!selected.spouses) selected.spouses=[];
    const n = prompt("Nama istri:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"F", children:[]});
    draw();
}

function addChild(){
    if(!selected.children){
        alert("Tambah anak melalui pasangan!");
        return;
    }

    const n = prompt("Nama anak:");
    if(!n) return;

    selected.children.push({name:n, spouses:[]});
    draw();
}

function deleteNode(){
    alert("Fitur hapus akan disempurnakan");
}

function saveData(){
    localStorage.setItem("tree", JSON.stringify(data));
    alert("Data tersimpan!");
}

// INIT
draw();

</script>
