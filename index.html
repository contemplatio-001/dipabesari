<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Nasab Pro V21 - Absolute Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --line-color: #000000; 
            --line-w: 4px; 
            --bg-card: #ffffff;
            --blue-navy: #1e3a8a;
        }
        body { background: #fdfdfd; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }

        /* --- LOGIN SCREEN --- */
        #login-screen { position: fixed; inset: 0; background: var(--blue-navy); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; }

        /* --- APP LAYOUT --- */
        #app { display: none; }
        .viewport { padding: 100px; display: inline-block; min-width: 100%; text-align: center; }

        /* --- THE CORE ENGINE (TABLE BASED) --- */
        table { border-collapse: collapse; margin: 0 auto; position: relative; }
        td { vertical-align: top; padding: 0; position: relative; text-align: center; }

        /* KARTU NAMA */
        .card-node { 
            display: inline-block; width: 180px; padding: 15px; 
            border: var(--line-w) solid var(--line-color); 
            background: var(--bg-card); font-weight: bold; font-size: 14px;
            position: relative; z-index: 10; margin: 0 5px;
        }
        .card-menantu { background: #f1f5f9; border-style: dashed; }

        /* GARIS PERNIKAHAN (Ayah-Ibu) */
        .marriage-bridge { height: var(--line-w); background: var(--line-color); width: 60px; display: inline-block; vertical-align: middle; position: relative; }
        
        /* GARIS TURUN (Pusat Keturunan) */
        .stem-down { 
            position: absolute; left: 50%; top: 0; width: var(--line-w); 
            height: 60px; background: var(--line-color); transform: translateX(-50%); 
        }

        /* GARIS SAUDARA (Horizontal) */
        .sibling-line-cell { height: 60px; }
        .line-left { position: absolute; top: 0; left: 0; width: 50%; height: var(--line-w); background: var(--line-color); }
        .line-right { position: absolute; top: 0; right: 0; width: 50%; height: var(--line-w); background: var(--line-color); }
        .line-up-siku { position: absolute; top: 0; left: 50%; width: var(--line-w); height: 30px; background: var(--line-color); transform: translateX(-50%); }

        /* UI BUTTONS */
        .menu-trigger { position: absolute; top: 5px; right: 8px; cursor: pointer; color: #94a3b8; }
        .drop-menu { 
            display: none; position: absolute; top: 30px; right: 0; background: white; 
            border: 2px solid black; z-index: 100; width: 150px; text-align: left;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }
        .drop-menu button { display: block; width: 100%; padding: 10px; font-size: 12px; border-bottom: 1px solid #eee; font-weight: bold; }
        .drop-menu button:hover { background: var(--blue-navy); color: white; }
        .show { display: block; }

        nav { background: var(--blue-navy); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid black; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 class="text-2xl font-black mb-6 uppercase tracking-widest text-blue-900">Admin Login</h2>
        <input type="text" id="user" placeholder="Username" class="w-full p-3 mb-3 border-2 border-gray-200 rounded-lg outline-none focus:border-blue-500">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 mb-6 border-2 border-gray-200 rounded-lg outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg hover:bg-black transition">MASUK</button>
    </div>
</div>

<div id="app">
    <nav>
        <div class="font-black text-xl italic tracking-tighter">NASAB PRO V21</div>
        <div class="flex gap-4">
            <button onclick="exportData()" class="text-xs font-bold bg-white text-blue-900 px-4 py-2 rounded">SIMPAN CADANGAN</button>
            <button onclick="importData()" class="text-xs font-bold bg-blue-700 px-4 py-2 rounded border border-white">BUKA FILE</button>
            <button onclick="location.reload()" class="text-xs font-bold bg-red-600 px-4 py-2 rounded">LOGOUT</button>
        </div>
    </nav>
    <div class="viewport" id="tree-container"></div>
</div>

<div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-[2000]">
    <div class="bg-white p-8 border-4 border-black w-96 shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-black text-xl border-b-4 border-black mb-6 pb-2 uppercase">Input Nasab</h3>
        <input type="text" id="m-name" placeholder="Nama Lengkap" class="w-full border-2 border-black p-3 mb-3 font-bold outline-none">
        <input type="text" id="m-note" placeholder="Tahun Lahir / Lokasi" class="w-full border-2 border-black p-3 mb-6 outline-none">
        <div id="rel-box" class="hidden mb-6">
            <label class="text-xs font-black text-blue-700 uppercase">Anak Dari Ibu:</label>
            <select id="m-rel" class="w-full border-2 border-black p-2 font-bold"></select>
        </div>
        <div class="flex justify-end gap-4">
            <button onclick="closeModal()" class="font-bold text-sm">BATAL</button>
            <button onclick="save()" class="bg-black text-white px-8 py-3 font-bold text-sm">SIMPAN DATA</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nasab_v21')) || {
        id: "root", name: "AYAH UTAMA", note: "Pancer", partners: [], children: []
    };
    let activeNode = null;

    function login() {
        if(document.getElementById('user').value === 'Admin' && document.getElementById('pass').value === 'Admin') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render();
        }
    }

    function render() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';
        container.appendChild(drawNode(db));
    }

    function drawNode(person) {
        const table = document.createElement('table');
        
        // 1. Baris Orang Tua
        const tr1 = document.createElement('tr');
        const td1 = document.createElement('td');
        td1.colSpan = Math.max(1, person.children.length);
        
        const parentFlex = document.createElement('div');
        parentFlex.style.display = 'inline-flex';
        parentFlex.style.alignItems = 'center';
        parentFlex.appendChild(createCard(person, false));

        person.partners.forEach((p, i) => {
            const bridge = document.createElement('div');
            bridge.className = "marriage-bridge";
            
            // Stem down tepat di tengah jembatan nikah jika punya anak
            if(person.children.some(c => c.fromId === p.id)) {
                const stem = document.createElement('div');
                stem.className = "stem-down";
                bridge.appendChild(stem);
            }
            
            parentFlex.appendChild(bridge);
            parentFlex.appendChild(createCard(p, true, person.id));
        });

        // Jika anak solo (tanpa pasangan)
        if(person.partners.length === 0 && person.children.length > 0) {
            const soloStem = document.createElement('div');
            soloStem.className = "stem-down";
            soloStem.style.top = "45px"; 
            parentFlex.appendChild(soloStem);
        }

        td1.appendChild(parentFlex);
        tr1.appendChild(td1);
        table.appendChild(tr1);

        // 2. Baris Garis Saudara (Horizontal)
        if(person.children.length > 0) {
            const trLine = document.createElement('tr');
            person.children.forEach((c, idx) => {
                const tdLine = document.createElement('td');
                tdLine.className = "sibling-line-cell";
                
                // Sambungan Horizontal
                if(person.children.length > 1) {
                    if(idx > 0) { const left = document.createElement('div'); left.className = "line-left"; tdLine.appendChild(left); }
                    if(idx < person.children.length - 1) { const right = document.createElement('div'); right.className = "line-right"; tdLine.appendChild(right); }
                }
                
                // Siku Vertikal ke Atas
                const siku = document.createElement('div');
                siku.className = "line-up-siku";
                tdLine.appendChild(siku);
                
                trLine.appendChild(tdLine);
            });
            table.appendChild(trLine);

            // 3. Baris Kartu Anak
            const trChildren = document.createElement('tr');
            person.children.forEach(c => {
                const tdChild = document.createElement('td');
                tdChild.appendChild(drawNode(c));
                trChildren.appendChild(tdChild);
            });
            table.appendChild(trChildren);
        }

        return table;
    }

    function createCard(p, isP, pId) {
        const div = document.createElement('div');
        div.className = `card-node ${isP ? 'card-menantu' : ''}`;
        div.innerHTML = `
            <span class="menu-trigger" onclick="toggleMenu(event)">⋮</span>
            <div class="drop-menu">
                <button onclick="openForm('edit', '${p.id}', '${isP?pId:''}')">✏️ EDIT DATA</button>
                ${!isP ? `<button onclick="openForm('child', '${p.id}')">👶 TAMBAH ANAK</button><button onclick="openForm('partner', '${p.id}')">💍 TAMBAH PASANGAN</button>` : ''}
                <button onclick="del('${p.id}', ${isP}, '${pId}')" style="color:red">🗑️ HAPUS</button>
            </div>
            <div class="uppercase">${p.name}</div>
            <div class="text-[10px] font-normal text-gray-500 mt-1">${p.note || ''}</div>
        `;
        return div;
    }

    // --- LOGIC FUNCTIONS ---
    function toggleMenu(e) {
        e.stopPropagation();
        document.querySelectorAll('.drop-menu').forEach(d => d.classList.remove('show'));
        e.target.nextElementSibling.classList.add('show');
    }
    window.onclick = () => document.querySelectorAll('.drop-menu').forEach(d => d.classList.remove('show'));

    function openForm(type, id, pId) {
        activeNode = { type, id, pId };
        const box = document.getElementById('rel-box');
        const sel = document.getElementById('m-rel');
        box.classList.add('hidden');
        if(type === 'child') {
            const n = find(db, id);
            if(n.partners.length > 0) {
                box.classList.remove('hidden');
                sel.innerHTML = `<option value="${n.id}">Utama (Tanpa Pasangan)</option>`;
                n.partners.forEach(p => sel.add(new Option(p.name, p.id)));
            }
        }
        const curr = find(db, id, pId);
        document.getElementById('m-name').value = type === 'edit' ? curr.name : '';
        document.getElementById('m-note').value = type === 'edit' ? curr.note : '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function save() {
        const name = document.getElementById('m-name').value;
        const note = document.getElementById('m-note').value;
        const fid = document.getElementById('m-rel').value;
        if(!name) return;
        if(activeNode.type === 'edit') {
            const n = find(db, activeNode.id, activeNode.pId);
            n.name = name; n.note = note;
        } else if(activeNode.type === 'child') {
            find(db, activeNode.id).children.push({ id: Date.now().toString(), name, note, partners: [], children: [], fromId: fid });
        } else {
            find(db, activeNode.id).partners.push({ id: Date.now().toString(), name, note });
        }
        localStorage.setItem('nasab_v21', JSON.stringify(db));
        render(); closeModal();
    }

    function find(root, id, pId) {
        if(pId) return find(db, pId).partners.find(x => x.id === id);
        if(root.id === id) return root;
        for(let c of root.children) { let r = find(c, id); if(r) return r; }
        return null;
    }

    function del(id, isP, pId) {
        if(id === 'root' || !confirm("Hapus?")) return;
        if(isP) { const p = find(db, pId); p.partners = p.partners.filter(x => x.id !== id); }
        else { removeNode(db, id); }
        localStorage.setItem('nasab_v21', JSON.stringify(db));
        render();
    }

    function removeNode(n, id) {
        n.children = n.children.filter(c => c.id !== id);
        n.children.forEach(c => removeNode(c, id));
    }

    function exportData() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:"application/json"}));
        a.download = "nasab_backup.json"; a.click();
    }

    function importData() {
        const i = document.createElement('input'); i.type = 'file';
        i.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = () => { db = JSON.parse(r.result); localStorage.setItem('nasab_v21', JSON.stringify(db)); render(); }
        };
        i.click();
    }
</script>
</body>
</html>
