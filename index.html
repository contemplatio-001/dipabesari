<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree Pro</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

#tree {
    width: 100%;
    height: 80vh;
    background: white;
}

.menu {
    position: absolute;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Family Tree Interaktif</h2>

<div id="tree"></div>

<!-- MENU -->
<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addSpouseNode()">👩 Tambah Pasangan</button>
    <button onclick="addChildNode()">👶 Tambah Anak</button>
    <button onclick="deleteNode()">❌ Hapus</button>
</div>

<script>

// DATA
let data = {
    name: "Ki. Adam",
    children: []
};

let selectedNode = null;

// DRAW TREE
function drawTree() {

    document.getElementById("tree").innerHTML = "";

    const width = window.innerWidth;
    const height = 500;

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", width)
        .attr("height", height);

    const root = d3.hierarchy(data);
    const treeLayout = d3.tree().size([width - 50, height - 50]);

    treeLayout(root);

    // garis
    svg.selectAll("line")
        .data(root.links())
        .enter()
        .append("line")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y)
        .attr("stroke", "black");

    // node
    const node = svg.selectAll("g")
        .data(root.descendants())
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.x},${d.y})`);

    node.append("circle")
        .attr("r", 20)
        .attr("fill", "white")
        .attr("stroke", "black");

    node.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", 5)
        .text(d => d.data.name);

    // klik node
    node.on("click", (event, d) => {
        selectedNode = d.data;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX + "px";
        menu.style.top = event.pageY + "px";
        menu.style.display = "block";
    });

    // klik luar = tutup menu
    document.body.onclick = function(e){
        if(!e.target.closest(".menu")){
            document.getElementById("menu").style.display="none";
        }
    }
}

// EDIT
function editNode(){
    const n = prompt("Nama baru:", selectedNode.name);
    if(n){
        selectedNode.name = n;
        drawTree();
    }
}

// TAMBAH ANAK
function addChildNode(){
    const n = prompt("Nama anak:");
    if(!n) return;

    if(!selectedNode.children) selectedNode.children = [];
    selectedNode.children.push({name:n});

    drawTree();
}

// TAMBAH PASANGAN
function addSpouseNode(){
    const n = prompt("Nama pasangan:");
    if(!n) return;

    selectedNode.children = selectedNode.children || [];
    selectedNode.children.push({name:"(Pasangan) " + n});

    drawTree();
}

// HAPUS
function deleteNode(){

    function remove(node, target){
        if(!node.children) return;

        node.children = node.children.filter(c => c !== target);

        node.children.forEach(c => remove(c, target));
    }

    if(selectedNode === data){
        alert("Tidak bisa hapus root!");
        return;
    }

    remove(data, selectedNode);
    drawTree();
}

// INIT
drawTree();

</script>

</body>
</html>
