<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pohon Nasab Keluarga</title>
    <style>
        /* === TEMA DOMINAN BIRU === */
        :root {
            --primary-blue: #0056b3;
            --light-blue: #e7f1ff;
            --bg-blue: #f0f8ff;
            --text-blue: #003d82;
            --white: #ffffff;
            --danger: #dc3545;
            --spouse-bg: #cce5ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-blue);
            color: var(--text-blue);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* === HALAMAN LOGIN === */
        #login-container {
            margin-top: 15vh;
            background: var(--white);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 86, 179, 0.2);
            text-align: center;
            width: 300px;
        }

        #login-container h2 { margin-top: 0; color: var(--primary-blue); }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 8px; border: 1px solid var(--primary-blue); 
            border-radius: 4px; box-sizing: border-box; 
        }
        
        button {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #004494; }
        button.danger { background-color: var(--danger); }
        button.danger:hover { background-color: #bd2130; }

        /* === HALAMAN UTAMA (POHON NASAB) === */
        #app-container { display: none; width: 100%; text-align: center; }
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tree-wrapper {
            width: 95%;
            margin: 20px auto;
            overflow-x: auto;
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 86, 179, 0.1);
            min-height: 60vh;
        }

        /* === CSS TREE (BAGAN) === */
        .tree ul {
            padding-top: 20px; position: relative;
            transition: all 0.5s;
            display: flex; justify-content: center;
        }

        .tree li {
            float: left; text-align: center;
            list-style-type: none; position: relative;
            padding: 20px 5px 0 5px;
        }

        /* Garis penghubung atas */
        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid var(--primary-blue);
            width: 50%; height: 20px;
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--primary-blue); }

        /* Hapus garis untuk anak tunggal */
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }

        /* Hapus garis ekstra pada anak pertama dan terakhir */
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid var(--primary-blue); border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }

        /* Garis turun ke anak */
        .tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid var(--primary-blue);
            width: 0; height: 20px;
        }

        /* Kotak Nama & Pasangan */
        .tree li a {
            border: 2px solid var(--primary-blue);
            padding: 10px;
            text-decoration: none;
            color: var(--primary-blue);
            display: inline-flex;
            flex-direction: column;
            gap: 5px;
            border-radius: 5px;
            background: var(--light-blue);
            transition: all 0.3s;
            min-width: 100px;
        }
        .tree li a:hover {
            box-shadow: 0 0 10px rgba(0, 86, 179, 0.4);
            transform: scale(1.05);
        }
        .name-main { font-weight: bold; }
        .name-spouse {
            font-size: 0.85em;
            color: #004494;
            background: var(--spouse-bg);
            padding: 3px 5px;
            border-radius: 3px;
            border: 1px dashed var(--primary-blue);
        }

        /* === MODAL (POPUP AKSI) === */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--white);
            padding: 20px; border-radius: 8px; width: 320px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 90%; padding: 8px; margin-bottom: 10px;
            border: 1px solid var(--primary-blue); border-radius: 4px;
        }
        .modal-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
        .modal-actions button { flex: 1 1 40%; font-size: 12px; }
        
    </style>
</head>
<body>

    <div id="login-container">
        <h2>Pohon Nasab</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <p id="login-error" style="color: red; font-size: 12px; display: none;">Username atau Password salah!</p>
        <button onclick="login()">Masuk</button>
    </div>

    <div id="app-container">
        <header>
            <h2 style="margin: 0;">Pohon Nasab Keluarga</h2>
            <button onclick="logout()" style="background-color: white; color: var(--primary-blue);">Keluar</button>
        </header>

        <div class="tree-wrapper">
            <div id="tree-render" class="tree">
                </div>
            
            <div id="empty-state" style="display: none; padding: 40px;">
                <p>Pohon nasab masih kosong.</p>
                <button onclick="addRoot()">Buat Leluhur Pertama</button>
            </div>
        </div>
    </div>

    <div id="action-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="color: var(--primary-blue); margin-top: 0;">Data Keluarga</h3>
            <input type="hidden" id="currentNodeId">
            <div style="text-align: left; width: 90%; margin: 0 auto;">
                <label style="font-size: 12px; font-weight: bold; color: var(--primary-blue);">Nama Utama:</label>
                <input type="text" id="nodeName" placeholder="Contoh: Budi">
                
                <label style="font-size: 12px; font-weight: bold; color: var(--primary-blue);">Nama Suami/Istri (Opsional):</label>
                <input type="text" id="spouseName" placeholder="Contoh: Siti">
            </div>
            <div class="modal-actions">
                <button onclick="saveEdit()">Simpan Data</button>
                <button onclick="addChild()">+ Tambah Anak</button>
                <button class="danger" onclick="deleteNode()">Hapus Data</button>
                <button onclick="closeModal()" style="background-color: #6c757d;">Batal</button>
            </div>
            <p style="font-size: 11px; color: gray; margin-top: 15px;">*Menghapus data akan ikut menghapus keturunannya.</p>
        </div>
    </div>

    <script>
        // --- 1. SISTEM LOGIN ---
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'Bismillah' && pass === 'Bismillah') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('login-error').style.display = 'none';
                renderTree();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        // --- 2. MANAJEMEN DATA (Local Storage) ---
        // Format Data: [{ id: 1, name: "Nama", spouse: "Pasangan", parentId: null }]
        let familyData = JSON.parse(localStorage.getItem('nasabData')) || [];

        // Fungsi ini otomatis dipanggil setiap ada perubahan data
        function saveData() {
            localStorage.setItem('nasabData', JSON.stringify(familyData));
            renderTree();
        }

        // --- 3. RENDER POHON NASAB ---
        function renderTree() {
            const treeContainer = document.getElementById('tree-render');
            const emptyState = document.getElementById('empty-state');

            if (familyData.length === 0) {
                treeContainer.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            const rootNodes = familyData.filter(d => d.parentId === null);
            let html = '<ul>';
            rootNodes.forEach(root => {
                html += buildNodeHTML(root);
            });
            html += '</ul>';

            treeContainer.innerHTML = html;
        }

        function buildNodeHTML(node) {
            let spouseHtml = '';
            if (node.spouse && node.spouse.trim() !== '') {
                spouseHtml = `<span class="name-spouse">💍 ${node.spouse}</span>`;
            }

            let html = `<li>
                <a href="#" onclick="openModal(${node.id})">
                    <span class="name-main">${node.name}</span>
                    ${spouseHtml}
                </a>
                ${buildChildrenHTML(node.id)}
            </li>`;
            return html;
        }

        function buildChildrenHTML(parentId) {
            const children = familyData.filter(d => d.parentId === parentId);
            if (children.length === 0) return '';
            
            let html = '<ul>';
            children.forEach(child => {
                html += buildNodeHTML(child);
            });
            html += '</ul>';
            return html;
        }

        // --- 4. SISTEM CRUD (Tambah, Edit, Hapus) ---
        function addRoot() {
            const name = prompt("Masukkan nama leluhur pertama:");
            if (name && name.trim() !== '') {
                familyData.push({ id: Date.now(), name: name, spouse: '', parentId: null });
                saveData(); // Otomatis tersimpan
            }
        }

        function openModal(id) {
            const node = familyData.find(d => d.id === id);
            if (node) {
                document.getElementById('currentNodeId').value = id;
                document.getElementById('nodeName').value = node.name;
                document.getElementById('spouseName').value = node.spouse || ''; // Isi pasangan jika ada
                document.getElementById('action-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('action-modal').style.display = 'none';
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('currentNodeId').value);
            const newName = document.getElementById('nodeName').value;
            const newSpouse = document.getElementById('spouseName').value;
            
            if (newName.trim() === '') return alert('Nama Utama tidak boleh kosong!');

            const nodeIndex = familyData.findIndex(d => d.id === id);
            if (nodeIndex > -1) {
                familyData[nodeIndex].name = newName;
                familyData[nodeIndex].spouse = newSpouse; // Simpan pasangan
                saveData(); // Otomatis tersimpan
                closeModal();
            }
        }

        function addChild() {
            const parentId = parseInt(document.getElementById('currentNodeId').value);
            const childName = prompt("Masukkan nama anak:");
            
            if (childName && childName.trim() !== '') {
                familyData.push({ id: Date.now(), name: childName, spouse: '', parentId: parentId });
                saveData(); // Otomatis tersimpan
                closeModal();
            }
        }

        function deleteNode() {
            const id = parseInt(document.getElementById('currentNodeId').value);
            const confirmDelete = confirm("Yakin ingin menghapus anggota ini beserta pasangannya dan SELURUH keturunannya?");
            
            if (confirmDelete) {
                function removeChildren(parentId) {
                    const children = familyData.filter(d => d.parentId === parentId);
                    children.forEach(child => {
                        removeChildren(child.id);
                        familyData = familyData.filter(d => d.id !== child.id);
                    });
                }
                
                removeChildren(id);
                familyData = familyData.filter(d => d.id !== id);
                
                saveData(); // Otomatis tersimpan
                closeModal();
            }
        }
    </script>
</body>
</html>
