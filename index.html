<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e3f2fd;
}

header {
    background: #1565c0;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

#tree-container {
    width: 100%;
    height: 80vh;
    overflow: auto;
    background: white;
}

svg {
    min-width: 1600px;
}

/* garis */
line {
    stroke: #1976d2;
    stroke-width: 2;
}

/* kotak */
.node rect {
    fill: #ffffff;
    stroke: #1565c0;
    stroke-width: 2;
    rx: 12;
}

/* teks SUPER JELAS */
.node text {
    font-size: 16px;
    font-weight: 900;
    fill: #000000;
    stroke: #ffffff;
    stroke-width: 3px;
    paint-order: stroke;
    pointer-events: none;
}

/* menu */
.menu {
    position: fixed;
    background: white;
    border: 2px solid #1565c0;
    border-radius: 10px;
    padding: 10px;
    display: none;
    z-index: 9999;
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    border: none;
    background: #1565c0;
    color: white;
    font-weight: bold;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>🌳 Family Tree</header>

<div id="tree-container">
    <div id="tree"></div>
</div>

<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addHusband()">👨 Tambah Suami</button>
    <button onclick="addWife()">👩 Tambah Istri</button>
    <button onclick="addChild()">👶 Tambah Anak</button>
    <button onclick="deleteNode()">❌ Hapus</button>
    <button onclick="saveData()">💾 Simpan</button>
</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("tree")) || {
    name: "Ki. Adam",
    gender: "M",
    spouses: [
        { name: "Ny. Agami", gender: "F", children: [] }
    ]
};

let selected = null;

// BUILD TREE
function build(person, depth=0, x=800, nodes=[], links=[]){

    const sx = 250;
    const sy = 140;

    nodes.push({name: person.name, x, y: depth*sy, ref: person});

    if(person.spouses){
        person.spouses.forEach((sp,i)=>{

            const px = person.gender==="M"
                ? x + (i+1)*sx
                : x - (i+1)*sx;

            nodes.push({name: sp.name, x:px, y:depth*sy, ref: sp});

            links.push({x1:x,y1:depth*sy,x2:px,y2:depth*sy});

            sp.children.forEach((c,j)=>{
                const cx = px - 80 + j*160;

                nodes.push({name:c.name,x:cx,y:(depth+1)*sy,ref:c});
                links.push({x1:px,y1:depth*sy,x2:cx,y2:(depth+1)*sy});

                build(c, depth+2, cx, nodes, links);
            });
        });
    }

    return {nodes,links};
}

// DRAW
function draw(){

    document.getElementById("tree").innerHTML="";

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width",1800)
        .attr("height",1000);

    const g = build(data);

    svg.selectAll("line")
        .data(g.links)
        .enter()
        .append("line")
        .attr("x1",d=>d.x1)
        .attr("y1",d=>d.y1)
        .attr("x2",d=>d.x2)
        .attr("y2",d=>d.y2);

    const node = svg.selectAll("g")
        .data(g.nodes)
        .enter()
        .append("g")
        .attr("class","node")
        .attr("transform",d=>`translate(${d.x},${d.y})`);

    node.append("rect")
        .attr("width",150)
        .attr("height",60)
        .attr("x",-75)
        .attr("y",-30);

    node.append("text")
        .attr("text-anchor","middle")
        .attr("dominant-baseline","middle")
        .attr("y",0)
        .text(d=>d.name);

    node.on("click",(e,d)=>{
        selected = d.ref;

        const menu = document.getElementById("menu");
        menu.style.left = e.clientX + "px";
        menu.style.top = e.clientY + "px";
        menu.style.display = "block";

        e.stopPropagation();
    });

    document.body.onclick = ()=>{
        document.getElementById("menu").style.display="none";
    }
}

// MENU
function editNode(){
    const n = prompt("Nama:");
    if(n){ selected.name=n; draw(); }
}

function addHusband(){
    if(!selected.spouses) selected.spouses=[];
    const n = prompt("Nama suami:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"M", children:[]});
    draw();
}

function addWife(){
    if(!selected.spouses) selected.spouses=[];
    const n = prompt("Nama istri:");
    if(!n) return;

    selected.spouses.push({name:n, gender:"F", children:[]});
    draw();
}

function addChild(){
    if(!selected.children){
        alert("Tambah anak melalui pasangan!");
        return;
    }

    const n = prompt("Nama anak:");
    if(!n) return;

    selected.children.push({name:n, spouses:[]});
    draw();
}

function deleteNode(){
    alert("Fitur hapus akan disempurnakan");
}

function saveData(){
    localStorage.setItem("tree", JSON.stringify(data));
    alert("Data tersimpan!");
}

// INIT
draw();

</script>

</body>
</html>
