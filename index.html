<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Nasab Pro - Struktur Terurut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue-dark: #1e3a8a; --line-color: #64748b; }
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Struktur Pohon dengan Jarak Luas */
        .tree-wrapper { display: flex; justify-content: center; padding: 60px; min-width: max-content; }
        .node-group { display: flex; flex-direction: column; align-items: center; position: relative; margin: 0 40px; }
        
        /* Baris Anggota & Pasangan */
        .member-row { display: flex; align-items: center; position: relative; gap: 60px; margin-bottom: 50px; }

        /* Garis Pernikahan (Samping) */
        .member-row::before {
            content: ""; position: absolute; top: 50%; left: 100px; right: 100px;
            height: 2px; border-top: 2px dashed var(--line-color); z-index: 0;
        }

        /* Garis Nasab (Bawah) */
        .vertical-line {
            width: 3px; height: 50px; background: var(--blue-dark);
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
        }

        /* Baris Anak dengan Border Top sebagai penghubung antar saudara */
        .children-row {
            display: flex; justify-content: center; position: relative;
            padding-top: 50px; border-top: 3px solid var(--blue-dark);
            gap: 20px; /* Jarak antar anak */
        }

        /* Kartu Desain */
        .card {
            width: 200px; background: white; border: 2px solid var(--blue-dark);
            border-radius: 12px; padding: 15px; z-index: 10; position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card-menantu { border-color: #94a3b8; border-style: dashed; background: #f8fafc; }
        
        /* Label Urutan */
        .order-badge {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--blue-dark); color: white; padding: 2px 10px;
            border-radius: 20px; font-size: 10px; font-weight: bold; white-space: nowrap;
        }

        /* Menu Floating */
        .dropdown { display: none; position: absolute; top: 35px; right: 10px; background: white; 
                    border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); z-index: 100; min-width: 160px; }
        .dropdown button { width: 100%; text-align: left; padding: 10px 15px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .dropdown button:hover { background: #eff6ff; color: #1e40af; }
        .show { display: block; }
    </style>
</head>
<body>

    <nav class="bg-blue-900 text-white p-4 fixed top-0 left-0 right-0 z-[200] shadow-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🌳</span>
            <div>
                <h1 class="font-black text-lg tracking-tighter">SILSILAH KELUARGA</h1>
                <p class="text-[10px] text-blue-300 font-medium italic">Manajemen Nasab & Urutan Keturunan</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-xs font-bold transition">Eksport Excel</button>
            <button onclick="window.print()" class="bg-white text-blue-900 px-4 py-2 rounded-lg text-xs font-bold transition">Cetak PDF</button>
            <button onclick="resetData()" class="bg-red-500 hover:bg-red-400 px-4 py-2 rounded-lg text-xs font-bold transition">Reset</button>
        </div>
    </nav>

    <main class="mt-20 overflow-auto bg-slate-100 min-h-[calc(100vh-80px)]">
        <div id="tree-display" class="tree-wrapper"></div>
    </main>

    <div id="modal-form" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[300] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 id="form-title" class="text-xl font-bold mb-6 text-slate-800 border-b pb-2">Tambah Anggota</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Nama Lengkap</label>
                    <input type="text" id="in-name" class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Jenis Kelamin</label>
                    <select id="in-gender" class="w-full border-2 border-slate-200 p-3 rounded-xl outline-none">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end mt-8 gap-4">
                <button onclick="hideModal()" class="text-slate-400 font-bold hover:text-slate-600">Batal</button>
                <button onclick="saveData()" class="bg-blue-700 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 shadow-lg shadow-blue-200">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        // Data Initialization
        let familyDB = JSON.parse(localStorage.getItem('nasab_v4_store')) || {
            id: "root", name: "Kepala Keluarga", gender: "Laki-laki", partners: [], children: [], order: 1
        };

        let currentTarget = { type: '', id: '', pId: '' };

        function initRender() {
            const container = document.getElementById('tree-display');
            container.innerHTML = '';
            container.appendChild(generateNode(familyDB, null, 0));
        }

        function generateNode(person, parentNode, childIdx) {
            const group = document.createElement('div');
            group.className = "node-group";

            const row = document.createElement('div');
            row.className = "member-row";

            // Kartu Utama (Anak Kandung)
            const mainCard = createCardHtml(person, false, parentNode, childIdx + 1);
            row.appendChild(mainCard);

            // Kartu Pasangan (Menantu)
            if (person.partners.length > 0) {
                person.partners.forEach((partner, pIdx) => {
                    row.appendChild(createCardHtml(partner, true, person.id, pIdx + 1));
                });

                // Garis Nasab turun dari tengah pasangan
                if (person.children.length > 0) {
                    const line = document.createElement('div');
                    line.className = "vertical-line";
                    row.appendChild(line);
                }
            } else if (person.children.length > 0) {
                // Jika tidak ada pasangan, garis turun dari kartu utama
                const line = document.createElement('div');
                line.className = "vertical-line";
                line.style.left = "100px"; 
                row.appendChild(line);
            }

            group.appendChild(row);

            // Render Cabang Anak
            if (person.children.length > 0) {
                const childRow = document.createElement('div');
                childRow.className = "children-row";
                person.children.forEach((child, index) => {
                    childRow.appendChild(generateNode(child, person, index));
                });
                group.appendChild(childRow);
            }

            return group;
        }

        function createCardHtml(p, isPartner, refId, orderNum) {
            const div = document.createElement('div');
            div.className = `card ${isPartner ? 'card-menantu' : ''}`;
            
            // Label Urutan
            let label = "";
            if (!isPartner && refId) {
                label = `<div class="order-badge">Anak ke-${orderNum}</div>`;
            } else if (isPartner) {
                label = `<div class="order-badge bg-slate-500">Pasangan ke-${orderNum}</div>`;
            }

            div.innerHTML = `
                ${label}
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[9px] font-black uppercase ${isPartner ? 'text-slate-400' : 'text-blue-700'}">
                        ${isPartner ? 'Menantu' : 'Kandung'}
                    </span>
                    <button onclick="toggleDropdown(event)" class="text-slate-400 hover:text-blue-600 font-bold">⋮</button>
                    <div class="dropdown">
                        <button onclick="openForm('edit', '${p.id}', '${isPartner ? refId : ''}')">✏️ Edit Profil</button>
                        ${!isPartner ? `
                            <button onclick="openForm('child', '${p.id}')">👶 Tambah Anak</button>
                            <button onclick="openForm('partner', '${p.id}')">💍 Tambah Pasangan</button>
                        ` : ''}
                        <button class="text-red-600" onclick="confirmDelete('${p.id}', ${isPartner}, '${refId}')">🗑️ Hapus Data</button>
                    </div>
                </div>
                <div class="font-bold text-slate-800 text-sm leading-tight mb-1">${p.name}</div>
                <div class="text-[10px] text-slate-500">${p.gender}</div>
            `;
            return div;
        }

        // --- Logic UI ---
        function toggleDropdown(e) {
            e.stopPropagation();
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
            e.target.nextElementSibling.classList.add('show');
        }

        window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));

        function openForm(type, id, pId = '') {
            currentTarget = { type, id, pId };
            document.getElementById('modal-form').classList.remove('hidden');
            if (type === 'edit') {
                const node = findById(familyDB, id, pId);
                document.getElementById('in-name').value = node.name;
                document.getElementById('form-title').innerText = "Edit Anggota";
            } else {
                document.getElementById('in-name').value = '';
                document.getElementById('form-title').innerText = type === 'child' ? "Tambah Anak" : "Tambah Pasangan";
            }
        }

        function hideModal() { document.getElementById('modal-form').classList.add('hidden'); }

        function saveData() {
            const name = document.getElementById('in-name').value;
            const gender = document.getElementById('in-gender').value;
            if (!name) return alert("Nama wajib diisi!");

            const { type, id, pId } = currentTarget;

            if (type === 'edit') {
                const node = findById(familyDB, id, pId);
                node.name = name; node.gender = gender;
            } else if (type === 'child') {
                const parent = findById(familyDB, id);
                parent.children.push({ id: "id_"+Date.now(), name, gender, partners: [], children: [] });
            } else {
                const parent = findById(familyDB, id);
                parent.partners.push({ id: "id_"+Date.now(), name, gender });
            }

            sync(); hideModal();
        }

        function findById(root, id, pId = '') {
            if (!pId) {
                if (root.id === id) return root;
                for (let c of root.children) {
                    let res = findById(c, id); if (res) return res;
                }
            } else {
                const parent = findById(familyDB, pId);
                return parent.partners.find(p => p.id === id);
            }
            return null;
        }

        function confirmDelete(id, isPartner, pId) {
            if (id === 'root') return alert("Akar silsilah tidak bisa dihapus.");
            if (confirm("Hapus data ini beserta seluruh keturunannya?")) {
                if (isPartner) {
                    const parent = findById(familyDB, pId);
                    parent.partners = parent.partners.filter(p => p.id !== id);
                } else {
                    deleteRecursive(familyDB, id);
                }
                sync();
            }
        }

        function deleteRecursive(root, id) {
            root.children = root.children.filter(c => c.id !== id);
            root.children.forEach(c => deleteRecursive(c, id));
        }

        function sync() {
            localStorage.setItem('nasab_v4_store', JSON.stringify(familyDB));
            initRender();
        }

        function resetData() {
            if (confirm("Hapus silsilah secara total?")) {
                localStorage.removeItem('nasab_v4_store');
                location.reload();
            }
        }

        function exportToExcel() {
            let list = [];
            const flat = (n, p = "-") => {
                list.push({ Nama: n.name, Gender: n.gender, Status: "Kandung", Hubungan: "Anak dari "+p });
                n.partners.forEach((pt, i) => list.push({ Nama: pt.name, Gender: pt.gender, Status: "Menantu", Hubungan: "Pasangan ke-"+(i+1)+" dari "+n.name }));
                n.children.forEach(c => flat(c, n.name));
            };
            flat(familyDB);
            const ws = XLSX.utils.json_to_sheet(list);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Database Nasab");
            XLSX.writeFile(wb, "Silsilah_Keluarga_Terurut.xlsx");
        }

        // Run
        initRender();
    </script>
</body>
</html>
