<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasab Pro V14 - Bloodline Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --line-color: #000; --bg-color: #fff; }
        body { background-color: var(--bg-color); font-family: sans-serif; }
        
        .tree-container { padding: 50px; display: inline-block; min-width: 100%; text-align: center; }

        /* KELUARGA INTI */
        .family-node { display: inline-flex; flex-direction: column; align-items: center; vertical-align: top; }

        /* AREA ORANG TUA */
        .parents-wrapper { display: flex; align-items: center; justify-content: center; position: relative; padding: 10px 0; }

        /* KARTU */
        .card { width: 140px; border: 2px solid #000; padding: 10px; background: white; position: relative; z-index: 10; font-size: 12px; text-align: center; }
        .card-partner { font-style: italic; background: #f9f9f9; }

        /* GARIS HUBUNGAN AYAH-IBU (Horizontal Pendek) */
        .marriage-line { width: 40px; height: 2px; background: var(--line-color); position: relative; flex-shrink: 0; }

        /* GARIS TURUN KE ANAK (Stem Vertikal dari Tengah Marriage Line) */
        .stem-down { position: absolute; left: 50%; top: 0; width: 2px; height: 40px; background: var(--line-color); transform: translateX(-50%); }

        /* GARIS CABANG HORIZONTAL (Untuk menampung banyak anak) */
        .branch-horizontal { width: 100%; height: 2px; background: var(--line-color); position: relative; margin-top: 0; }

        /* AREA ANAK-ANAK */
        .children-container { display: flex; justify-content: center; gap: 40px; padding-top: 20px; position: relative; }

        /* GARIS VERTIKAL KE TIAP ANAK */
        .line-to-child { position: absolute; top: -20px; left: 50%; width: 2px; height: 20px; background: var(--line-color); transform: translateX(-50%); }

        /* UI Tambahan */
        .menu-btn { cursor: pointer; position: absolute; right: 5px; top: 0; font-weight: bold; font-size: 14px; }
        .dropdown { display: none; position: absolute; right: 0; top: 25px; background: white; border: 1px solid #000; z-index: 100; width: 150px; text-align: left; }
        .dropdown button { width: 100%; padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; }
        .show { display: block; }
    </style>
</head>
<body>

<nav class="bg-black text-white p-4 flex justify-between items-center sticky top-0 z-[1000]">
    <h1 class="text-xs font-bold tracking-widest uppercase">Nasab V14 - Bloodline Flow</h1>
    <div class="flex gap-4">
        <button onclick="exportData()" class="border border-white px-3 py-1 text-[10px]">SAVE JSON</button>
        <button onclick="importData()" class="border border-white px-3 py-1 text-[10px]">OPEN JSON</button>
        <button onclick="resetData()" class="text-red-500 font-bold text-[10px]">RESET</button>
    </div>
</nav>

<div class="tree-container" id="tree-root"></div>

<div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-[2000]">
    <div class="bg-white p-6 border-2 border-black w-80">
        <h3 class="font-bold mb-4 text-sm border-b-2 border-black pb-2">INPUT DATA</h3>
        <input type="text" id="m-name" placeholder="Nama" class="w-full border-2 border-black p-2 mb-2 outline-none">
        <input type="text" id="m-note" placeholder="Keterangan" class="w-full border-2 border-black p-2 mb-2 outline-none text-sm">
        <div id="rel-area" class="hidden mb-4">
            <label class="text-[10px] font-bold">ANAK DARI PASANGAN:</label>
            <select id="m-rel" class="w-full border-2 border-black p-1 text-xs bg-gray-50"></select>
        </div>
        <div class="flex justify-end gap-4 mt-4">
            <button onclick="closeModal()" class="text-xs font-bold">BATAL</button>
            <button onclick="save()" class="bg-black text-white px-6 py-2 text-xs font-bold">SIMPAN</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('nasab_v14')) || {
        id: "root", name: "Kepala Keluarga", note: "", partners: [], children: []
    };

    let activeNode = { type: '', id: '', pId: '' };

    function render() {
        const root = document.getElementById('tree-root');
        root.innerHTML = '';
        root.appendChild(createFamilyNode(db));
    }

    function createFamilyNode(person) {
        const container = document.createElement('div');
        container.className = "family-node";

        // 1. Orang Tua & Pasangan
        const pWrapper = document.createElement('div');
        pWrapper.className = "parents-wrapper";

        pWrapper.appendChild(createCard(person, false));

        // Grouping Anak
        const groups = {};
        groups[person.id] = person.children.filter(c => !c.fromId || c.fromId === person.id);
        
        person.partners.forEach(p => {
            const mLine = document.createElement('div');
            mLine.className = "marriage-line";
            
            const kids = person.children.filter(c => c.fromId === p.id);
            if(kids.length > 0) {
                groups[p.id] = kids;
                const stem = document.createElement('div');
                stem.className = "stem-down";
                mLine.appendChild(stem);
            }
            
            pWrapper.appendChild(mLine);
            pWrapper.appendChild(createCard(p, true, person.id));
        });

        container.appendChild(pWrapper);

        // 2. Garis Horizontal Cabang & Anak-anak
        const parentIdsWithKids = Object.keys(groups).filter(k => groups[k].length > 0);
        
        if(parentIdsWithKids.length > 0) {
            // Kita render semua anak dalam satu baris besar sesuai gambar
            const cContainer = document.createElement('div');
            cContainer.className = "children-container";

            // Garis horizontal panjang (Branch)
            const branch = document.createElement('div');
            branch.className = "branch-horizontal";
            container.appendChild(branch);

            person.children.forEach(child => {
                const childNode = createFamilyNode(child);
                // Tambah garis vertikal kecil di atas tiap anak
                const lineUp = document.createElement('div');
                lineUp.className = "line-to-child";
                childNode.prepend(lineUp);
                
                cContainer.appendChild(childNode);
            });
            container.appendChild(cContainer);
        }

        return container;
    }

    function createCard(p, isP, refId) {
        const div = document.createElement('div');
        div.className = `card ${isP ? 'card-partner' : ''}`;
        div.innerHTML = `
            <span onclick="toggleMenu(event)" class="menu-btn">⋮</span>
            <div class="dropdown">
                <button onclick="openModal('edit', '${p.id}', '${isP?refId:''}')">EDIT DATA</button>
                ${!isP ? `<button onclick="openModal('child', '${p.id}')">TAMBAH ANAK</button>
                          <button onclick="openModal('partner', '${p.id}')">TAMBAH PASANGAN</button>` : ''}
                <button class="text-red-600" onclick="del('${p.id}', ${isP}, '${refId}')">HAPUS</button>
            </div>
            <div class="font-bold uppercase">${p.name}</div>
            <div class="text-[9px] text-gray-500 mt-1">${p.note || ''}</div>
        `;
        return div;
    }

    function toggleMenu(e) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        e.target.nextElementSibling.classList.add('show');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));

    function openModal(type, id, pId = '') {
        activeNode = { type, id, pId };
        document.getElementById('modal').classList.remove('hidden');
        const rArea = document.getElementById('rel-area');
        const rSel = document.getElementById('m-rel');
        rArea.classList.add('hidden');

        if(type === 'child') {
            const n = find(db, id);
            if(n.partners.length > 0) {
                rArea.classList.remove('hidden');
                rSel.innerHTML = `<option value="${n.id}">Utama (${n.name})</option>`;
                n.partners.forEach((p, i) => rSel.add(new Option(`Dgn Pasangan: ${p.name}`, p.id)));
            }
        }
        document.getElementById('m-name').value = (type==='edit') ? find(db, id, pId).name : '';
        document.getElementById('m-note').value = (type==='edit') ? find(db, id, pId).note || '' : '';
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function save() {
        const name = document.getElementById('m-name').value;
        if(!name) return;
        const note = document.getElementById('m-note').value;
        const fid = document.getElementById('m-rel').value;

        if(activeNode.type === 'edit') {
            const n = find(db, activeNode.id, activeNode.pId);
            n.name = name; n.note = note;
        } else if(activeNode.type === 'child') {
            const p = find(db, activeNode.id);
            p.children.push({ id: "id"+Date.now(), name, note, partners: [], children: [], fromId: fid || p.id });
        } else {
            const p = find(db, activeNode.id);
            p.partners.push({ id: "id"+Date.now(), name, note });
        }
        localStorage.setItem('nasab_v14', JSON.stringify(db));
        render(); closeModal();
    }

    function find(root, id, pId = '') {
        if(!pId) {
            if(root.id === id) return root;
            for(let c of root.children) { let r = find(c, id); if(r) return r; }
        } else {
            return find(db, pId).partners.find(pt => pt.id === id);
        }
        return null;
    }

    function del(id, isP, pId) {
        if(id === 'root' || !confirm("Hapus?")) return;
        if(isP) {
            const p = find(db, pId);
            p.partners = p.partners.filter(pt => pt.id !== id);
        } else {
            removeRec(db, id);
        }
        localStorage.setItem('nasab_v14', JSON.stringify(db));
        render();
    }

    function removeRec(n, id) {
        n.children = n.children.filter(c => c.id !== id);
        n.children.forEach(c => removeRec(c, id));
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "nasab_v14.json"; a.click();
    }

    function importData() {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader(); reader.readAsText(e.target.files[0]);
            reader.onload = () => { db = JSON.parse(reader.result); localStorage.setItem('nasab_v14', JSON.stringify(db)); render(); }
        };
        input.click();
    }

    function resetData() { if(confirm("Hapus semua?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
