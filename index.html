<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Tree Modern UI</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2f7, #dfe9f3);
}

/* HEADER */
header {
    background: linear-gradient(90deg, #000, #555);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* CONTAINER */
#tree-container {
    width: 100%;
    height: 85vh;
    overflow: auto;
}

/* SVG */
svg {
    min-width: 1600px;
}

/* GARIS */
line {
    stroke: #bbb;
    stroke-width: 2;
}

/* NODE CARD */
.node rect {
    fill: #ffffff;
    stroke: #ddd;
    stroke-width: 1.5;
    rx: 15;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15));
}

/* TEKS */
.node text {
    font-size: 13px;
    font-weight: 600;
    fill: #333;
}

/* AVATAR */
.avatar {
    fill: #ccc;
}

/* MENU */
.menu {
    position: absolute;
    background: white;
    border-radius: 12px;
    padding: 10px;
    display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.menu button {
    display: block;
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border: none;
    background: linear-gradient(90deg, #000, #444);
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.menu button:hover {
    background: linear-gradient(90deg, #333, #666);
}
</style>
</head>

<body>

<header>
    🌳 Family Tree Modern
</header>

<div id="tree-container">
    <div id="tree"></div>
</div>

<div id="menu" class="menu">
    <button onclick="editNode()">✏️ Edit</button>
    <button onclick="addSpouse()">👩 Pasangan</button>
    <button onclick="addChild()">👶 Anak</button>
</div>

<script>

// DATA
let data = {
    name: "Ki. Adam",
    spouses: [
        { name: "Ny. Agami", children: [] }
    ]
};

let selected = null;

// BUILD
function buildNodes(person, depth = 0, x = 800, nodes = [], links = []) {

    const spaceX = 250;
    const spaceY = 140;

    // suami
    nodes.push({
        name: person.name,
        x: x,
        y: depth * spaceY,
        ref: person
    });

    person.spouses.forEach((spouse, i) => {

        const sx = x + (i + 1) * spaceX;

        // istri
        nodes.push({
            name: spouse.name,
            x: sx,
            y: depth * spaceY,
            ref: spouse
        });

        // garis pasangan
        links.push({
            x1: x, y1: depth * spaceY,
            x2: sx, y2: depth * spaceY
        });

        spouse.children.forEach((child, idx) => {

            const cx = sx - 80 + idx * 160;

            nodes.push({
                name: child.name,
                x: cx,
                y: (depth + 1) * spaceY,
                ref: child
            });

            links.push({
                x1: sx, y1: depth * spaceY,
                x2: cx, y2: (depth + 1) * spaceY
            });

            buildNodes(child, depth + 2, cx, nodes, links);
        });

    });

    return {nodes, links};
}

// DRAW
function draw(){

    document.getElementById("tree").innerHTML = "";

    const svg = d3.select("#tree")
        .append("svg")
        .attr("width", 1800)
        .attr("height", 1000);

    const graph = buildNodes(data);

    // garis
    svg.selectAll("line")
        .data(graph.links)
        .enter()
        .append("line")
        .attr("x1", d=>d.x1)
        .attr("y1", d=>d.y1)
        .attr("x2", d=>d.x2)
        .attr("y2", d=>d.y2);

    // node
    const node = svg.selectAll("g")
        .data(graph.nodes)
        .enter()
        .append("g")
        .attr("transform", d=>`translate(${d.x},${d.y})`);

    // card
    node.append("rect")
        .attr("width", 150)
        .attr("height", 60)
        .attr("x", -75)
        .attr("y", -30);

    // avatar
    node.append("circle")
        .attr("cx", 0)
        .attr("cy", -20)
        .attr("r", 12)
        .attr("class", "avatar");

    // nama
    node.append("text")
        .attr("dy", 10)
        .attr("text-anchor", "middle")
        .text(d => d.name);

    // klik
    node.on("click", (event, d) => {
        selected = d.ref;

        const menu = document.getElementById("menu");
        menu.style.left = event.pageX + "px";
        menu.style.top = event.pageY + "px";
        menu.style.display = "block";

        event.stopPropagation();
    });

    document.body.onclick = () => {
        document.getElementById("menu").style.display = "none";
    };
}

// MENU
function editNode(){
    const n = prompt("Nama:");
    if(n){ selected.name=n; draw(); }
}

function addSpouse(){
    if(!selected.spouses) selected.spouses = [];
    const n = prompt("Nama pasangan:");
    if(!n) return;

    selected.spouses.push({name:n, children:[]});
    draw();
}

function addChild(){
    alert("Tambah anak melalui pasangan");
}

// INIT
draw();

</script>

</body>
</html>
