<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasab Pro V10 - Jalur Terisolasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blue-line: #1e40af; --gray-line: #94a3b8; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        /* Container Utama */
        .tree-container { padding: 80px; min-width: max-content; display: flex; justify-content: center; }
        
        /* Blok Utama Per Orang (Node) */
        .node { display: flex; flex-direction: column; align-items: center; position: relative; margin: 0 20px; }

        /* Baris Pasangan (Suami + Istri-istri) */
        .couple-row { display: flex; justify-content: center; gap: 40px; position: relative; margin-bottom: 20px; }
        .couple-row::after { content: ""; position: absolute; top: 50%; left: 80px; right: 80px; height: 2px; border-top: 2px dashed var(--gray-line); z-index: 0; }

        /* Kartu Anggota */
        .card { width: 180px; padding: 12px; background: white; border: 2px solid var(--blue-line); border-radius: 12px; position: relative; z-index: 10; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-menantu { border-color: var(--gray-line); border-style: dashed; background: #fafafa; }

        /* Badge Keterangan */
        .badge { position: absolute; top: -10px; left: 10px; background: var(--blue-line); color: white; font-size: 8px; padding: 1px 6px; border-radius: 4px; font-weight: bold; z-index: 20; }

        /* JALUR TURUNAN TERISOLASI */
        /* Garis vertikal langsung di bawah masing-masing orang tua yang punya anak */
        .line-to-children { width: 2px; height: 40px; background: var(--blue-line); margin-top: 0; position: relative; }
        
        /* Wadah Anak-anak khusus untuk orang tua tersebut */
        .children-group { display: flex; justify-content: center; border-top: 2px solid var(--blue-line); padding-top: 20px; position: relative; }

        /* Tombol Menu */
        .menu-dots { cursor: pointer; float: right; color: #cbd5e1; font-weight: bold; }
        .dropdown { display: none; position: absolute; right: 0; top: 30px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); z-index: 100; width: 160px; }
        .dropdown button { width: 100%; text-align: left; padding: 8px 12px; font-size: 11px; border-bottom: 1px solid #f1f5f9; }
        .show { display: block; }
    </style>
</head>
<body>

<nav class="bg-blue-900 text-white p-4 sticky top-0 z-[1000] flex justify-between shadow-lg">
    <h1 class="font-bold">NASAB PRO V10 <span class="text-[10px] bg-blue-700 px-2 py-0.5 rounded ml-2">ANTI-RANCU</span></h1>
    <button onclick="resetData()" class="bg-red-600 px-3 py-1 rounded text-xs font-bold">RESET DATA</button>
</nav>

<div class="tree-container" id="tree-display"></div>

<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[2000]">
    <div class="bg-white p-6 rounded-2xl w-80 shadow-2xl">
        <h3 class="font-bold mb-4">Input Data</h3>
        <input type="text" id="in-name" placeholder="Nama Lengkap" class="w-full border p-2 mb-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        <div id="rel-box" class="hidden mb-3">
            <label class="text-[10px] font-bold text-gray-400">ANAK DARI:</label>
            <select id="in-rel" class="w-full border p-2 rounded-lg bg-blue-50 text-sm"></select>
        </div>
        <div class="flex justify-end gap-2">
            <button onclick="closeModal()" class="text-gray-400">Batal</button>
            <button onclick="save()" class="bg-blue-800 text-white px-5 py-2 rounded-lg font-bold">Simpan</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('nasab_v10')) || {
        id: "root", name: "Kepala Keluarga", partners: [], children: []
    };

    let active = { type: '', id: '' };

    function render() {
        const root = document.getElementById('tree-display');
        root.innerHTML = '';
        root.appendChild(renderPerson(data));
    }

    function renderPerson(person) {
        const container = document.createElement('div');
        container.className = "node";

        // Row Orang Tua & Pasangan
        const pRow = document.createElement('div');
        pRow.className = "couple-row";

        // Card Orang Utama
        const mainCard = createCard(person, false);
        pRow.appendChild(mainCard);

        // Card Pasangan
        person.partners.forEach((p, i) => {
            pRow.appendChild(createCard(p, true, person.id, i+1));
        });

        container.appendChild(pRow);

        // LOGIKA BARU: Tampilkan Anak TEPAT di bawah orang tuanya masing-masing
        // Kita kumpulkan semua anak dalam satu baris, tapi pengelompokannya berdasarkan ayah/ibu
        const allChildren = person.children;
        if (allChildren.length > 0) {
            const cRow = document.createElement('div');
            cRow.className = "flex justify-center gap-10";

            // Buat grup anak untuk Orang Utama
            const mainKids = allChildren.filter(c => !c.from || c.from === person.id);
            if(mainKids.length > 0) {
                const group = createGroup(mainKids, "Utama", mainCard);
                cRow.appendChild(group);
            }

            // Buat grup anak untuk tiap Pasangan
            person.partners.forEach((p, idx) => {
                const partnerKids = allChildren.filter(c => c.from === p.id);
                if(partnerKids.length > 0) {
                    const group = createGroup(partnerKids, `Psng ${idx+1}`, pRow.children[idx+1]);
                    cRow.appendChild(group);
                }
            });

            container.appendChild(cRow);
        }

        return container;
    }

    function createGroup(kids, label, parentEl) {
        const wrap = document.createElement('div');
        wrap.className = "flex flex-col items-center";

        // Garis vertikal penyambung ke orang tua
        const vLine = document.createElement('div');
        vLine.className = "line-to-children";
        wrap.appendChild(vLine);

        const groupDiv = document.createElement('div');
        groupDiv.className = "children-group";
        
        kids.forEach((k, i) => {
            k.info = `Anak ke-${i+1} dari ${label}`;
            groupDiv.appendChild(renderPerson(k));
        });

        wrap.appendChild(groupDiv);
        return wrap;
    }

    function createCard(p, isP, refId, order) {
        const card = document.createElement('div');
        card.className = `card ${isP ? 'card-menantu' : ''}`;
        card.innerHTML = `
            ${(isP || p.info) ? `<div class="badge">${isP ? 'Psng ke-'+order : p.info}</div>` : ''}
            <span onclick="toggleMenu(event)" class="menu-dots">⋮</span>
            <div class="dropdown">
                ${!isP ? `<button onclick="openModal('child', '${p.id}')">👶 Tambah Anak</button>
                          <button onclick="openModal('partner', '${p.id}')">💍 Tambah Pasangan</button>` : ''}
                <button onclick="openModal('edit', '${p.id}', '${isP?refId:''}')">✏️ Edit Nama</button>
                <button class="text-red-500" onclick="del('${p.id}', ${isP}, '${refId}')">🗑️ Hapus</button>
            </div>
            <div class="text-[8px] font-black text-blue-800 uppercase">${isP?'Menantu':'Kandung'}</div>
            <div class="font-bold text-xs truncate mt-1">${p.name}</div>
        `;
        return card;
    }

    function toggleMenu(e) {
        e.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));
        e.target.nextElementSibling.classList.add('show');
    }

    window.onclick = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('show'));

    function openModal(type, id, pId = '') {
        active = { type, id, pId };
        document.getElementById('modal').classList.remove('hidden');
        const rBox = document.getElementById('rel-box');
        const rSel = document.getElementById('in-rel');
        rBox.classList.add('hidden');

        if(type === 'child') {
            const n = find(data, id);
            if(n.partners.length > 0) {
                rBox.classList.remove('hidden');
                rSel.innerHTML = `<option value="${n.id}">Utama (${n.name})</option>`;
                n.partners.forEach((p, i) => {
                    rSel.add(new Option(`Pasangan ke-${i+1} (${p.name})`, p.id));
                });
            }
        }
        document.getElementById('in-name').value = (type === 'edit') ? find(data, id, pId).name : '';
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function save() {
        const name = document.getElementById('in-name').value;
        if(!name) return;
        const from = document.getElementById('in-rel').value;

        if(active.type === 'edit') {
            const n = find(data, active.id, active.pId);
            n.name = name;
        } else if(active.type === 'child') {
            const p = find(data, active.id);
            p.children.push({ id: "id"+Date.now(), name, partners: [], children: [], from: from || p.id });
        } else {
            const p = find(data, active.id);
            p.partners.push({ id: "id"+Date.now(), name });
        }
        localStorage.setItem('nasab_v10', JSON.stringify(data));
        render(); closeModal();
    }

    function find(root, id, pId = '') {
        if(!pId) {
            if(root.id === id) return root;
            for(let c of root.children) { let r = find(c, id); if(r) return r; }
        } else {
            return find(data, pId).partners.find(pt => pt.id === id);
        }
        return null;
    }

    function del(id, isP, pId) {
        if(id === 'root' || !confirm("Hapus?")) return;
        if(isP) {
            const p = find(data, pId);
            p.partners = p.partners.filter(pt => pt.id !== id);
        } else {
            removeRec(data, id);
        }
        localStorage.setItem('nasab_v10', JSON.stringify(data));
        render();
    }

    function removeRec(n, id) {
        n.children = n.children.filter(c => c.id !== id);
        n.children.forEach(c => removeRec(c, id));
    }

    function resetData() { if(confirm("Hapus semua?")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
