<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pohon Nasab - Aplikasi Silsilah Keluarga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .tree-container {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
            background-color: #0f172a;
            touch-action: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-panel-mobile {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .node-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            touch-action: pan-y;
        }

        .node-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .node-card:active {
            transform: scale(0.98);
        }

        .connection-line {
            stroke: rgba(148, 163, 184, 0.4);
            stroke-width: 2;
            fill: none;
            transition: all 0.3s ease;
        }

        .connection-line.active {
            stroke: #60a5fa;
            stroke-width: 3;
            filter: drop-shadow(0 0 4px rgba(96, 165, 250, 0.5));
        }

        .node-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .floating-controls {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-enter {
            animation: modalEnter 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalEnter {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .gender-male { border-color: #60a5fa; }
        .gender-female { border-color: #f472b6; }
        
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 200px;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .mobile-header {
                padding: 0.75rem 1rem;
            }
            
            .mobile-title {
                font-size: 1rem;
            }
            
            .mobile-menu-btn {
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .node-card {
                width: 160px !important;
                padding: 0.75rem !important;
            }
            
            .node-card img {
                width: 40px !important;
                height: 40px !important;
            }
            
            .node-card h3 {
                font-size: 0.875rem;
            }
            
            .floating-controls-mobile {
                bottom: 80px;
                right: 16px;
            }
            
            .floating-controls-mobile button {
                width: 48px;
                height: 48px;
            }
            
            .stats-panel-mobile {
                bottom: 80px;
                left: 16px;
                right: auto;
                max-width: 140px;
                padding: 0.75rem;
            }
            
            .bottom-nav-mobile {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                display: flex;
                justify-content: space-around;
                padding: 0.5rem 0;
                z-index: 50;
            }
            
            .bottom-nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 0.5rem 1rem;
                color: #94a3b8;
                font-size: 0.625rem;
                transition: all 0.2s;
            }
            
            .bottom-nav-item.active {
                color: #a855f7;
            }
            
            .bottom-nav-item i {
                font-size: 1.25rem;
            }
            
            .mobile-modal {
                position: fixed;
                inset: 0;
                z-index: 50;
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(4px);
                display: flex;
                align-items: flex-end;
                justify-content: center;
            }
            
            .mobile-modal-content {
                background: rgba(15, 23, 42, 0.98);
                border-radius: 24px 24px 0 0;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
                animation: slideUp 0.3s ease-out;
            }
            
            .mobile-action-sheet {
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(15, 23, 42, 0.98);
                border-radius: 16px;
                padding: 0.5rem;
                display: flex;
                gap: 0.5rem;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                z-index: 40;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .mobile-node-context {
                position: fixed;
                background: rgba(15, 23, 42, 0.98);
                border-radius: 12px;
                padding: 0.5rem;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
                z-index: 60;
                border: 1px solid rgba(255, 255, 255, 0.1);
                min-width: 160px;
            }
            
            .touch-indicator {
                position: absolute;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: rgba(168, 85, 247, 0.3);
                border: 2px solid #a855f7;
                pointer-events: none;
                transform: translate(-50%, -50%);
                animation: touchPulse 0.6s ease-out forwards;
                z-index: 9999;
            }
            
            @keyframes touchPulse {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
            }
        }

        /* PDF Preview Styles */
        .pdf-preview-container {
            background: white;
            color: black;
            font-family: 'Times New Roman', serif;
        }

        .pdf-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        @media (max-width: 768px) {
            .pdf-page {
                width: 100%;
                min-height: auto;
                padding: 15px;
                font-size: 11px;
            }
            
            .pdf-title {
                font-size: 20px !important;
            }
            
            .pdf-members {
                grid-template-columns: 1fr !important;
            }
        }

        .pdf-header {
            text-align: center;
            border-bottom: 3px double #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .pdf-title {
            font-size: 28px;
            font-weight: bold;
            color: #1a1a1a;
            font-family: 'Playfair Display', serif;
            margin-bottom: 10px;
        }

        .pdf-subtitle {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }

        .pdf-content {
            font-size: 12px;
            line-height: 1.6;
        }

        .pdf-family-tree {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pdf-generation {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: #fafafa;
        }

        .pdf-gen-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-members {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .pdf-member-card {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            background: white;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .pdf-member-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        .pdf-member-info h4 {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #1a1a1a;
        }

        .pdf-member-info p {
            font-size: 11px;
            color: #666;
            margin: 2px 0;
        }

        .pdf-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
        }

        .pdf-badge-male {
            background: #dbeafe;
            color: #1e40af;
        }

        .pdf-badge-female {
            background: #fce7f3;
            color: #9d174d;
        }

        .pdf-badge-deceased {
            background: #e5e7eb;
            color: #374151;
        }

        .pdf-footer {
            position: absolute;
            bottom: 20mm;
            left: 20mm;
            right: 20mm;
            text-align: center;
            font-size: 10px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        @media (max-width: 768px) {
            .pdf-footer {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                margin-top: 30px;
            }
        }

        .pdf-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .pdf-stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .pdf-stat-box {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
        }

        .pdf-stat-number {
            font-size: 24px;
            font-weight: bold;
        }

        .pdf-stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .pdf-timestamp {
            text-align: right;
            font-size: 10px;
            color: #999;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Swipe gestures */
        .swipe-area {
            touch-action: pan-y pinch-zoom;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-white">

    <!-- Desktop Header -->
    <div class="hidden md:flex fixed top-0 left-0 right-0 z-50 glass-panel border-b border-white/10 px-6 py-4 justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
                <i class="fas fa-tree text-white text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold font-['Playfair_Display'] tracking-wide">Pohon Nasab</h1>
                <p class="text-xs text-gray-300">Aplikasi Silsilah Keluarga</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="app.exportData()" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all flex items-center gap-2 text-sm font-medium">
                <i class="fas fa-download"></i> Export JSON
            </button>
            <button onclick="app.openPdfModal()" class="px-4 py-2 rounded-lg bg-red-500/20 hover:bg-red-500/30 border border-red-500/30 transition-all flex items-center gap-2 text-sm font-medium text-red-300">
                <i class="fas fa-file-pdf"></i> Export PDF A4
            </button>
            <label class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all flex items-center gap-2 text-sm font-medium cursor-pointer">
                <i class="fas fa-upload"></i> Import
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="app.importData(this)">
            </label>
            <button onclick="app.resetView()" class="px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-700 transition-all flex items-center gap-2 text-sm font-medium shadow-lg shadow-purple-500/30">
                <i class="fas fa-compress-arrows-alt"></i> Reset View
            </button>
        </div>
    </div>

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 left-0 right-0 z-50 glass-panel-mobile border-b border-white/10 px-4 py-3 flex justify-between items-center mobile-header">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg">
                <i class="fas fa-tree text-white text-sm"></i>
            </div>
            <div>
                <h1 class="text-base font-bold font-['Playfair_Display'] mobile-title">Pohon Nasab</h1>
            </div>
        </div>
        <button onclick="app.toggleMobileMenu()" class="mobile-menu-btn rounded-lg bg-white/10 active:bg-white/20 transition-all">
            <i class="fas fa-bars text-lg"></i>
        </button>
    </div>

    <!-- Mobile Menu Modal -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden bg-black/80 backdrop-blur-sm" onclick="app.closeMobileMenu(event)">
        <div class="absolute top-16 right-4 left-4 glass-panel-mobile rounded-2xl p-4 border border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-4 pb-3 border-b border-white/10">
                <h3 class="font-semibold text-lg">Menu</h3>
                <button onclick="app.closeMobileMenu()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="space-y-2">
                <button onclick="app.exportData(); app.closeMobileMenu()" class="w-full px-4 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3 text-left">
                    <i class="fas fa-download text-blue-400"></i>
                    <span>Export JSON</span>
                </button>
                <button onclick="app.openPdfModal(); app.closeMobileMenu()" class="w-full px-4 py-3 rounded-xl bg-red-500/10 hover:bg-red-500/20 transition-all flex items-center gap-3 text-left text-red-300">
                    <i class="fas fa-file-pdf"></i>
                    <span>Export PDF A4</span>
                </button>
                <label class="w-full px-4 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3 text-left cursor-pointer block">
                    <i class="fas fa-upload text-green-400"></i>
                    <span>Import Data</span>
                    <input type="file" class="hidden" accept=".json" onchange="app.importData(this); app.closeMobileMenu()">
                </label>
                <button onclick="app.resetView(); app.closeMobileMenu()" class="w-full px-4 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition-all flex items-center gap-3 text-left">
                    <i class="fas fa-compress-arrows-alt text-purple-400"></i>
                    <span>Reset View</span>
                </button>
                <div class="border-t border-white/10 my-2 pt-2">
                    <div class="flex justify-between items-center px-2 py-2 text-sm text-gray-400">
                        <span>Total Anggota</span>
                        <span id="mobile-stat-total" class="font-bold text-white">0</span>
                    </div>
                    <div class="flex justify-between items-center px-2 py-2 text-sm text-gray-400">
                        <span>Generasi</span>
                        <span id="mobile-stat-gen" class="font-bold text-white">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Canvas Area -->
    <div id="canvas-container" class="tree-container w-full h-full cursor-grab active:cursor-grabbing relative overflow-hidden swipe-area" style="padding-top: 60px;">
        <svg id="connections" class="absolute inset-0 w-full h-full pointer-events-none" style="top: 60px;"></svg>
        <div id="nodes-container" class="absolute inset-0" style="top: 60px;"></div>
        
        <!-- Desktop Floating Controls -->
        <div class="hidden md:flex fixed bottom-6 right-6 flex-col gap-2 z-40">
            <button onclick="app.zoomIn()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white/20 transition-all shadow-lg floating-controls">
                <i class="fas fa-plus text-lg"></i>
            </button>
            <button onclick="app.zoomOut()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center hover:bg-white/20 transition-all shadow-lg floating-controls" style="animation-delay: 0.5s">
                <i class="fas fa-minus text-lg"></i>
            </button>
            <button onclick="app.addRootMember()" class="w-12 h-12 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center hover:scale-110 transition-all shadow-lg shadow-purple-500/40 floating-controls" style="animation-delay: 1s" title="Tambah Anggota Root">
                <i class="fas fa-user-plus text-lg"></i>
            </button>
        </div>

        <!-- Mobile Floating Controls -->
        <div class="md:hidden fixed bottom-24 right-4 flex-col gap-3 z-40 floating-controls-mobile hidden" id="mobile-fab">
            <button onclick="app.zoomIn()" class="w-12 h-12 rounded-full glass-panel-mobile border border-white/20 flex items-center justify-center active:scale-95 transition-all shadow-lg">
                <i class="fas fa-plus text-lg"></i>
            </button>
            <button onclick="app.zoomOut()" class="w-12 h-12 rounded-full glass-panel-mobile border border-white/20 flex items-center justify-center active:scale-95 transition-all shadow-lg">
                <i class="fas fa-minus text-lg"></i>
            </button>
            <button onclick="app.addRootMember()" class="w-14 h-14 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-purple-500/40">
                <i class="fas fa-user-plus text-xl"></i>
            </button>
        </div>

        <!-- Desktop Stats Panel -->
        <div class="hidden md:block fixed bottom-6 left-6 glass-panel rounded-2xl p-4 z-40 max-w-xs slide-in">
            <h3 class="text-sm font-semibold mb-3 text-gray-300 uppercase tracking-wider">Statistik Keluarga</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center">
                    <div id="stat-total" class="text-2xl font-bold text-purple-400">0</div>
                    <div class="text-xs text-gray-400">Total Anggota</div>
                </div>
                <div class="text-center">
                    <div id="stat-generations" class="text-2xl font-bold text-pink-400">0</div>
                    <div class="text-xs text-gray-400">Generasi</div>
                </div>
            </div>
        </div>

        <!-- Mobile Stats Panel -->
        <div class="md:hidden fixed bottom-24 left-4 glass-panel-mobile rounded-xl p-3 z-40 stats-panel-mobile border border-white/10">
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-purple-400"></div>
                    <span class="text-xs text-gray-400">Anggota:</span>
                    <span id="mobile-stat-total-float" class="text-sm font-bold">0</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-pink-400"></div>
                    <span class="text-xs text-gray-400">Generasi:</span>
                    <span id="mobile-stat-gen-float" class="text-sm font-bold">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <div class="md:hidden bottom-nav-mobile">
        <button onclick="app.setMobileMode('view')" class="bottom-nav-item active" id="nav-view">
            <i class="fas fa-eye"></i>
            <span>Lihat</span>
        </button>
        <button onclick="app.toggleMobileFab()" class="bottom-nav-item" id="nav-add">
            <i class="fas fa-plus-circle text-2xl text-purple-400"></i>
            <span>Tambah</span>
        </button>
        <button onclick="app.setMobileMode('edit')" class="bottom-nav-item" id="nav-edit">
            <i class="fas fa-edit"></i>
            <span>Edit</span>
        </button>
    </div>

    <!-- Mobile Node Context Menu -->
    <div id="mobile-context-menu" class="mobile-node-context hidden">
        <div class="space-y-1">
            <button onclick="app.addChild()" class="w-full px-4 py-2 rounded-lg hover:bg-white/10 transition-all flex items-center gap-3 text-sm text-left">
                <i class="fas fa-plus text-green-400"></i>
                <span>Tambah Anak</span>
            </button>
            <button onclick="app.addPartner()" class="w-full px-4 py-2 rounded-lg hover:bg-white/10 transition-all flex items-center gap-3 text-sm text-left">
                <i class="fas fa-heart text-pink-400"></i>
                <span>Tambah Pasangan</span>
            </button>
            <button onclick="app.editMember()" class="w-full px-4 py-2 rounded-lg hover:bg-white/10 transition-all flex items-center gap-3 text-sm text-left">
                <i class="fas fa-edit text-blue-400"></i>

    <script>
        class FamilyTreeApp {
            constructor() {
                this.members = [];
                this.scale = 1;
                this.translateX = 0;
                this.translateY = 0;
                this.isDragging = false;
                this.lastX = 0;
                this.lastY = 0;
                this.selectedNode = null;
                this.nodeWidth = 200;
                this.nodeHeight = 100;
                this.levelHeight = 150;
                this.siblingGap = 220;
                this.isMobile = window.innerWidth < 768;
                this.mobileMode = 'view'; // 'view', 'edit'
                this.touchStartTime = 0;
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.longPressTimer = null;
                
                this.init();
            }

            init() {
                this.loadData();
                this.setupEventListeners();
                this.setupMobileGestures();
                this.render();
                this.updateStats();
                
                window.addEventListener('resize', () => {
                    this.isMobile = window.innerWidth < 768;
                    this.render();
                });
            }

            loadData() {
                const saved = localStorage.getItem('familyTreeData');
                if (saved) {
                    this.members = JSON.parse(saved);
                } else {
                    this.members = [
                        {
                            id: '1',
                            name: 'Kakek Nasab',
                            gender: 'male',
                            birthYear: 1950,
                            status: 'living',
                            parentId: null,
                            partnerId: '2',
                            x: 0,
                            y: 0,
                            photo: 'https://i.pravatar.cc/150?img=11'
                        },
                        {
                            id: '2',
                            name: 'Nenek Siti',
                            gender: 'female',
                            birthYear: 1955,
                            status: 'living',
                            parentId: null,
                            partnerId: '1',
                            x: 240,
                            y: 0,
                            photo: 'https://i.pravatar.cc/150?img=5'
                        },
                        {
                            id: '3',
                            name: 'Ayah Ahmad',
                            gender: 'male',
                            birthYear: 1975,
                            status: 'living',
                            parentId: '1',
                            partnerId: '4',
                            x: -120,
                            y: 150,
                            photo: 'https://i.pravatar.cc/150?img=3'
                        },
                        {
                            id: '4',
                            name: 'Ibu Fatimah',
                            gender: 'female',
                            birthYear: 1980,
                            status: 'living',
                            parentId: null,
                            partnerId: '3',
                            x: 120,
                            y: 150,
                            photo: 'https://i.pravatar.cc/150?img=9'
                        },
                        {
                            id: '5',
                            name: 'Budi Santoso',
                            gender: 'male',
                            birthYear: 2000,
                            status: 'living',
                            parentId: '3',
                            partnerId: null,
                            x: 0,
                            y: 300,
                            photo: 'https://i.pravatar.cc/150?img=12'
                        }
                    ];
                }
            }

            saveToStorage() {
                localStorage.setItem('familyTreeData', JSON.stringify(this.members));
            }

            setupEventListeners() {
                const container = document.getElementById('canvas-container');
                
                // Mouse events for desktop
                container.addEventListener('mousedown', (e) => {
                    if (e.target === container || e.target.id === 'connections') {
                        this.isDragging = true;
                        this.lastX = e.clientX;
                        this.lastY = e.clientY;
                        container.style.cursor = 'grabbing';
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const dx = e.clientX - this.lastX;
                        const dy = e.clientY - this.lastY;
                        this.translateX += dx;
                        this.translateY += dy;
                        this.lastX = e.clientX;
                        this.lastY = e.clientY;
                        this.updateTransform();
                    }
                });

                window.addEventListener('mouseup', () => {
                    this.isDragging = false;
                    container.style.cursor = 'grab';
                });

                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                    this.scale = Math.max(0.3, Math.min(3, this.scale * delta));
                    this.updateTransform();
                });

                // Close menus on click elsewhere
                window.addEventListener('click', (e) => {
                    if (!e.target.closest('#context-menu-desktop') && !e.target.closest('.mobile-node-context')) {
                        document.getElementById('context-menu-desktop').classList.add('hidden');
                        document.getElementById('mobile-context-menu').classList.add('hidden');
                    }
                });

                // Keyboard shortcuts
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'Delete' && this.selectedNode) {
                        this.deleteMember();
                    }
                    if (e.key === 'Escape') {
                        this.closeModal();
                        this.closePdfModal();
                        this.closeMobileMenu();
                        document.getElementById('context-menu-desktop').classList.add('hidden');
                        document.getElementById('mobile-context-menu').classList.add('hidden');
                    }
                });
            }

            setupMobileGestures() {
                const container = document.getElementById('canvas-container');
                
                container.addEventListener('touchstart', (e) => {
                    this.touchStartTime = Date.now();
                    this.touchStartX = e.touches[0].clientX;
                    this.touchStartY = e.touches[0].clientY;
                    
                    // Show touch indicator
                    const indicator = document.getElementById('touch-indicator');
                    indicator.style.left = this.touchStartX + 'px';
                    indicator.style.top = this.touchStartY + 'px';
                    indicator.classList.remove('hidden');
                    
                    // Long press detection for context menu
                    if (e.target.closest('.node-card')) {
                        this.longPressTimer = setTimeout(() => {
                            const nodeEl = e.target.closest('.node-card');
                            const id = nodeEl.dataset.id;
                            this.selectNode(id);
                            this.showMobileContextMenu(this.touchStartX, this.touchStartY);
                            navigator.vibrate?.(50); // Haptic feedback
                        }, 600);
                    }
                }, { passive: true });

                container.addEventListener('touchmove', (e) => {
                    // Clear long press if moved
                    if (this.longPressTimer) {
                        clearTimeout(this.longPressTimer);
                        this.longPressTimer = null;
                    }
                    
                    if (e.touches.length === 1) {
                        const dx = e.touches[0].clientX - this.touchStartX;
                        const dy = e.touches[0].clientY - this.touchStartY;
                        
                        // Pan if moved significantly
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            this.translateX += dx * 0.5;
                            this.translateY += dy * 0.5;
                            this.touchStartX = e.touches[0].clientX;
                            this.touchStartY = e.touches[0].clientY;
                            this.updateTransform();
                        }
                    } else if (e.touches.length === 2) {
                        // Pinch zoom
                        const dist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        if (this.lastPinchDist) {
                            const delta = dist / this.lastPinchDist;
                            this.scale = Math.max(0.3, Math.min(3, this.scale * delta));
                            this.updateTransform();
                        }
                        this.lastPinchDist = dist;
                    }
                }, { passive: true });

                container.addEventListener('touchend', (e) => {
                    // Hide touch indicator
                    document.getElementById('touch-indicator').classList.add('hidden');
                    
                    if (this.longPressTimer) {
                        clearTimeout(this.longPressTimer);
                        this.longPressTimer = null;
                    }
                    this.lastPinchDist = null;
                    
                    // Tap detection
                    const touchDuration = Date.now() - this.touchStartTime;
                    if (touchDuration < 200) {
                        const target = e.target.closest('.node-card');
                        if (target) {
                            const id = target.dataset.id;
                            this.selectNode(id);
                            if (this.mobileMode === 'edit') {
                                this.showMobileContextMenu(
                                    parseFloat(target.style.left) + 80, 
                                    parseFloat(target.style.top) + 50
                                );
                            }
                        }
                    }
                }, { passive: true });
            }

            updateTransform() {
                const nodesContainer = document.getElementById('nodes-container');
                const connections = document.getElementById('connections');
                const transform = `translate(${this.translateX}px, ${this.translateY}px) scale(${this.scale})`;
                nodesContainer.style.transform = transform;
                
                const rect = document.getElementById('canvas-container').getBoundingClientRect();
                const offsetTop = this.isMobile ? 60 : 0;
                connections.setAttribute('viewBox', `${-this.translateX} ${-this.translateY - offsetTop} ${rect.width / this.scale} ${(rect.height - offsetTop) / this.scale}`);
            }

            calculateLayout() {
                const levels = {};
                
                this.members.forEach(member => {
                    const level = this.getLevel(member.id);
                    if (!levels[level]) levels[level] = [];
                    levels[level].push(member);
                });

                const maxLevel = Math.max(...Object.keys(levels).map(Number), 0);
                const containerWidth = window.innerWidth;
                const centerX = containerWidth / 2;
                const startY = this.isMobile ? 80 : 100;
                
                // Adjust spacing for mobile
                const siblingGap = this.isMobile ? 180 : 220;
                const levelHeight = this.isMobile ? 120 : 150;

                for (let level = 0; level <= maxLevel; level++) {
                    const nodes = levels[level] || [];
                    const totalWidth = (nodes.length - 1) * siblingGap;
                    let startX = centerX - totalWidth / 2;

                    nodes.forEach((node, index) => {
                        if (node.partnerId && node.gender === 'male') {
                            node.x = startX + index * siblingGap;
                            const partner = this.members.find(m => m.id === node.partnerId);
                            if (partner) {
                                partner.x = node.x + (this.isMobile ? 200 : 240);
                                partner.y = startY + level * levelHeight;
                            }
                        } else if (!node.partnerId || node.gender === 'female') {
                            const partner = this.members.find(m => m.partnerId === node.id);
                            if (!partner) {
                                node.x = startX + index * siblingGap;
                            }
                        }
                        node.y = startY + level * levelHeight;
                    });
                }
            }

            getLevel(memberId) {
                let level = 0;
                let current = this.members.find(m => m.id === memberId);
                while (current && current.parentId) {
                    level++;
                    current = this.members.find(m => m.id === current.parentId);
                }
                return level;
            }

            render() {
                this.calculateLayout();
                
                const container = document.getElementById('nodes-container');
                const svg = document.getElementById('connections');
                
                container.innerHTML = '';
                svg.innerHTML = '';

                this.drawConnections(svg);
                
                this.members.forEach(member => {
                    const node = this.createNodeElement(member);
                    container.appendChild(node);
                });

                this.updateTransform();
            }

            drawConnections(svg) {
                this.members.forEach(member => {
                    if (member.parentId) {
                        const parent = this.members.find(m => m.id === member.parentId);
                        if (parent) {
                            this.drawLine(svg, parent.x + (this.isMobile ? 80 : 100), parent.y + 40, member.x + (this.isMobile ? 80 : 100), member.y, 'parent');
                        }
                    }
                    
                    if (member.partnerId && member.gender === 'male') {
                        const partner = this.members.find(m => m.id === member.partnerId);
                        if (partner) {
                            this.drawLine(svg, member.x + (this.isMobile ? 160 : 200), member.y + 40, partner.x, partner.y + 40, 'partner');
                        }
                    }
                });
            }

            drawLine(svg, x1, y1, x2, y2, type) {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                let d;
                if (type === 'partner') {
                    d = `M ${x1} ${y1} L ${x2} ${y2}`;
                } else {
                    const midY = (y1 + y2) / 2;
                    d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
                }
                
                path.setAttribute('d', d);
                path.setAttribute('class', 'connection-line');
                if (type === 'partner') {
                    path.style.strokeDasharray = '5,5';
                }
                svg.appendChild(path);
            }

            createNodeElement(member) {
                const div = document.createElement('div');
                const isMobile = this.isMobile;
                const width = isMobile ? 160 : 200;
                
                div.className = `node-card absolute glass-panel rounded-2xl p-3 cursor-pointer border-2 ${member.gender === 'male' ? 'gender-male' : 'gender-female'} ${member.status === 'deceased' ? 'opacity-60' : ''}`;
                div.style.left = `${member.x}px`;
                div.style.top = `${member.y}px`;
                div.style.width = `${width}px`;
                div.dataset.id = member.id;
                
                if (this.selectedNode === member.id) {
                    div.classList.add('ring-2', 'ring-purple-400', 'ring-offset-2', 'ring-offset-slate-900');
                }

                const photoUrl = member.photo || `https://i.pravatar.cc/150?u=${member.id}`;
                const imgSize = isMobile ? 'w-10 h-10' : 'w-12 h-12';
                
                div.innerHTML = `
                    <div class="flex items-center gap-2 ${isMobile ? '' : 'gap-3'}">
                        <div class="relative flex-shrink-0">
                            <img src="${photoUrl}" alt="${member.name}" class="${imgSize} rounded-full object-cover border-2 ${member.gender === 'male' ? 'border-blue-400' : 'border-pink-400'}">
                            ${member.status === 'deceased' ? '<div class="absolute inset-0 rounded-full bg-black/50 flex items-center justify-center"><i class="fas fa-cross text-[10px] text-white"></i></div>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-sm truncate leading-tight">${member.name}</h3>
                            <p class="text-xs text-gray-400">${member.birthYear || '-'}</p>
                            <span class="inline-block mt-0.5 px-1.5 py-0.5 rounded-full text-[9px] ${member.gender === 'male' ? 'bg-blue-500/20 text-blue-300' : 'bg-pink-500/20 text-pink-300'}">
                                ${member.gender === 'male' ? 'L' : 'P'}
                            </span>
                        </div>
                    </div>
                `;

                // Desktop events
                if (!isMobile) {
                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.selectNode(member.id);
                    });

                    div.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        this.selectNode(member.id);
                        this.showContextMenu(e.clientX, e.clientY);
                    });

                    div.addEventListener('mouseenter', (e) => {
                        this.showTooltip(e, member);
                    });

                    div.addEventListener('mouseleave', () => {
                        document.getElementById('tooltip').style.opacity = '0';
                    });
                }

                return div;
            }

            showTooltip(e, member) {
                if (this.isMobile) return;
                const tooltip = document.getElementById('tooltip');
                tooltip.innerHTML = `
                    <div class="font-semibold">${member.name}</div>
                    <div class="text-gray-300">Lahir: ${member.birthYear || 'Unknown'}</div>
                    <div class="text-gray-300">Status: ${member.status === 'living' ? 'Hidup' : 'Wafat'}</div>
                    ${member.notes ? `<div class="mt-1 text-gray-400 italic">${member.notes}</div>` : ''}
                `;
                tooltip.style.left = e.pageX + 10 + 'px';
                tooltip.style.top = e.pageY + 10 + 'px';
                tooltip.style.opacity = '1';
            }

            selectNode(id) {
                this.selectedNode = id;
                this.render();
            }

            showContextMenu(x, y) {
                const menu = document.getElementById('context-menu-desktop');
                menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
                menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
                menu.classList.remove('hidden');
            }

            showMobileContextMenu(x, y) {
                const menu = document.getElementById('mobile-context-menu');
                // Adjust position to keep in viewport
                const menuWidth = 180;
                const menuHeight = 200;
                
                let left = x;
                let top = y;
                
                if (left + menuWidth > window.innerWidth) {
                    left = window.innerWidth - menuWidth - 20;
                }
                if (top + menuHeight > window.innerHeight - 100) {
                    top = window.innerHeight - menuHeight - 120;
                }
                
                menu.style.left = left + 'px';
                menu.style.top = top + 'px';
                menu.classList.remove('hidden');
            }

            // Mobile UI Functions
            toggleMobileMenu() {
                const menu = document.getElementById('mobile-menu');
                menu.classList.toggle('hidden');
            }

            closeMobileMenu(e) {
                if (e && e.target.id === 'mobile-menu') {
                    document.getElementById('mobile-menu').classList.add('hidden');
                } else if (!e) {
                    document.getElementById('mobile-menu').classList.add('hidden');
                }
            }

            toggleMobileFab() {
                const fab = document.getElementById('mobile-fab');
                fab.classList.toggle('hidden');
            }

            setMobileMode(mode) {
                this.mobileMode = mode;
                document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`nav-${mode}`).classList.add('active');
                
                if (mode === 'view') {
                    document.getElementById('mobile-fab').classList.add('hidden');
                }
            }

            // Modal Functions
            addRootMember() {
                if (this.isMobile) {
                    document.getElementById('member-form-mobile').reset();
                    document.getElementById('member-id-mobile').value = '';
                    document.getElementById('parent-id-mobile').value = '';
                    document.getElementById('modal-title-mobile').textContent = 'Tambah Anggota';
                    document.getElementById('member-modal-mobile').classList.remove('hidden');
                    document.getElementById('mobile-fab')?.classList.add('hidden');
                } else {
                    document.getElementById('member-form-desktop').reset();
                    document.getElementById('member-id-desktop').value = '';
                    document.getElementById('parent-id-desktop').value = '';
                    document.getElementById('modal-title-desktop').textContent = 'Tambah Anggota Root';
                    document.getElementById('member-modal-desktop').classList.remove('hidden');
                    document.getElementById('member-modal-desktop').classList.add('flex');
                }
            }

            addChild() {
                if (!this.selectedNode) return;
                if (this.isMobile) {
                    document.getElementById('member-form-mobile').reset();
                    document.getElementById('member-id-mobile').value = '';
                    document.getElementById('parent-id-mobile').value = this.selectedNode;
                    document.getElementById('modal-title-mobile').textContent = 'Tambah Anak';
                    document.getElementById('member-modal-mobile').classList.remove('hidden');
                    document.getElementById('mobile-context-menu').classList.add('hidden');
                } else {
                    document.getElementById('member-form-desktop').reset();
                    document.getElementById('member-id-desktop').value = '';
                    document.getElementById('parent-id-desktop').value = this.selectedNode;
                    document.getElementById('modal-title-desktop').textContent = 'Tambah Anak';
                    document.getElementById('member-modal-desktop').classList.remove('hidden');
                    document.getElementById('member-modal-desktop').classList.add('flex');
                    document.getElementById('context-menu-desktop').classList.add('hidden');
                }
            }

            addPartner() {
                if (!this.selectedNode) return;
                const member = this.members.find(m => m.id === this.selectedNode);
                if (member.partnerId) {
                    alert('Anggota ini sudah memiliki pasangan!');
                    return;
                }
                
                if (this.isMobile) {
                    document.getElementById('member-form-mobile').reset();
                    document.getElementById('member-id-mobile').value = '';
                    document.getElementById('parent-id-mobile').value = '';
                    document.getElementById('modal-title-mobile').textContent = 'Tambah Pasangan';
                    document.getElementById('member-modal-mobile').classList.remove('hidden');
                    document.getElementById('mobile-context-menu').classList.add('hidden');
                    this.tempPartnerFor = this.selectedNode;
                } else {
                    document.getElementById('member-form-desktop').reset();
                    document.getElementById('member-id-desktop').value = '';
                    document.getElementById('parent-id-desktop').value = '';
                    document.getElementById('modal-title-desktop').textContent = 'Tambah Pasangan';
                    document.getElementById('member-modal-desktop').classList.remove('hidden');
                    document.getElementById('member-modal-desktop').classList.add('flex');
                    document.getElementById('context-menu-desktop').classList.add('hidden');
                    this.tempPartnerFor = this.selectedNode;
                }
            }

            editMember() {
                if (!this.selectedNode) return;
                const member = this.members.find(m => m.id === this.selectedNode);
                
                if (this.isMobile) {
                    document.getElementById('member-id-mobile').value = member.id;
                    document.getElementById('parent-id-mobile').value = member.parentId || '';
                    document.getElementById('member-name-mobile').value = member.name;
                    document.getElementById('member-gender-mobile').value = member.gender;
                    document.getElementById('member-birth-mobile').value = member.birthYear || '';
                    document.getElementById('member-status-mobile').value = member.status;
                    document.getElementById('member-photo-mobile').value = member.photo || '';
                    document.getElementById('member-notes-mobile').value = member.notes || '';
                    document.getElementById('modal-title-mobile').textContent = 'Edit Anggota';
                    document.getElementById('member-modal-mobile').classList.remove('hidden');
                    document.getElementById('mobile-context-menu').classList.add('hidden');
                } else {
                    document.getElementById('member-id-desktop').value = member.id;
                    document.getElementById('parent-id-desktop').value = member.parentId || '';
                    document.getElementById('member-name-desktop').value = member.name;
                    document.getElementById('member-gender-desktop').value = member.gender;
                    document.getElementById('member-birth-desktop').value = member.birthYear || '';
                    document.getElementById('member-status-desktop').value = member.status;
                    document.getElementById('member-photo-desktop').value = member.photo || '';
                    document.getElementById('member-notes-desktop').value = member.notes || '';
                    document.getElementById('modal-title-desktop').textContent = 'Edit Anggota';
                    document.getElementById('member-modal-desktop').classList.remove('hidden');
                    document.getElementById('member-modal-desktop').classList.add('flex');
                    document.getElementById('context-menu-desktop').classList.add('hidden');
                }
            }

            deleteMember() {
                if (!this.selectedNode) return;
                if (!confirm('Apakah Anda yakin ingin menghapus anggota ini? Semua keturunannya juga akan terhapus.')) return;
                
                const toDelete = new Set();
                const queue = [this.selectedNode];
                
                while (queue.length > 0) {
                    const id = queue.shift();
                    toDelete.add(id);
                    
                    this.members.filter(m => m.parentId === id).forEach(child => {
                        if (!toDelete.has(child.id)) queue.push(child.id);
                    });
                }
                
                this.members = this.members.filter(m => !toDelete.has(m.id));
                
                this.members.forEach(m => {
                    if (toDelete.has(m.partnerId)) m.partnerId = null;
                });
                
                this.selectedNode = null;
                this.saveToStorage();
                this.render();
                this.updateStats();
                document.getElementById('context-menu-desktop').classList.add('hidden');
                document.getElementById('mobile-context-menu').classList.add('hidden');
            }

            saveMember(e, platform) {
                e.preventDefault();
                
                const suffix = platform === 'mobile' ? '-mobile' : '-desktop';
                const id = document.getElementById(`member-id${suffix}`).value;
                const parentId = document.getElementById(`parent-id${suffix}`).value;
                const name = document.getElementById(`member-name${suffix}`).value;
                const gender = document.getElementById(`member-gender${suffix}`).value;
                const birthYear = document.getElementById(`member-birth${suffix}`).value;
                const status = document.getElementById(`member-status${suffix}`).value;
                const photo = document.getElementById(`member-photo${suffix}`).value;
                const notes = document.getElementById(`member-notes${suffix}`).value;
                
                if (id) {
                    const member = this.members.find(m => m.id === id);
                    member.name = name;
                    member.gender = gender;
                    member.birthYear = birthYear ? parseInt(birthYear) : null;
                    member.status = status;
                    member.photo = photo;
                    member.notes = notes;
                } else {
                    const newMember = {
                        id: Date.now().toString(),
                        name,
                        gender,
                        birthYear: birthYear ? parseInt(birthYear) : null,
                        status,
                        photo,
                        notes,
                        parentId: parentId || null,
                        partnerId: null,
                        x: 0,
                        y: 0
                    };
                    
                    if (this.tempPartnerFor) {
                        newMember.partnerId = this.tempPartnerFor;
                        const partner = this.members.find(m => m.id === this.tempPartnerFor);
                        if (partner) partner.partnerId = newMember.id;
                        this.tempPartnerFor = null;
                    }
                    
                    this.members.push(newMember);
                }
                
                this.saveToStorage();
                this.closeModal();
                this.render();
                this.updateStats();
            }

            closeModal() {
                document.getElementById('member-modal-desktop').classList.add('hidden');
                document.getElementById('member-modal-desktop').classList.remove('flex');
                document.getElementById('member-modal-mobile').classList.add('hidden');
                this.tempPartnerFor = null;
            }

            closeModalMobile(e) {
                if (e.target.classList.contains('mobile-modal')) {
                    this.closeModal();
                }
            }

            zoomIn() {
                this.scale = Math.min(3, this.scale * 1.2);
                this.updateTransform();
            }

            zoomOut() {
                this.scale = Math.max(0.3, this.scale / 1.2);
                this.updateTransform();
            }

            resetView() {
                this.scale = 1;
                this.translateX = 0;
                this.translateY = 0;
                this.updateTransform();
            }

            updateStats() {
                const total = this.members.length;
                const maxLevel = Math.max(...this.members.map(m => this.getLevel(m.id)), 0);
                
                // Desktop
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-generations').textContent = maxLevel + 1;
                
                // Mobile
                document.getElementById('mobile-stat-total').textContent = total;
                document.getElementById('mobile-stat-gen').textContent = maxLevel + 1;
                document.getElementById('mobile-stat-total-float').textContent = total;
                document.getElementById('mobile-stat-gen-float').textContent = maxLevel + 1;
            }

            // PDF Functions
            openPdfModal() {
                this.generatePdfPreview();
                if (this.isMobile) {
                    document.getElementById('pdf-modal-mobile').classList.remove('hidden');
                } else {
                    document.getElementById('pdf-modal-desktop').classList.remove('hidden');
                    document.getElementById('pdf-modal-desktop').classList.add('flex');
                }
            }

            closePdfModal() {
                document.getElementById('pdf-modal-desktop').classList.add('hidden');
                document.getElementById('pdf-modal-desktop').classList.remove('flex');
                document.getElementById('pdf-modal-mobile').classList.add('hidden');
            }

            closePdfModalMobile(e) {
                if (e.target.classList.contains('mobile-modal')) {
                    this.closePdfModal();
                }
            }

            generatePdfPreview() {
                const suffix = this.isMobile ? '-mobile' : '-desktop';
                const includeDeceased = document.getElementById(`pdf-include-deceased${suffix}`).checked;
                const includePhotos = document.getElementById(`pdf-include-photos${suffix}`).checked;
                
                let members = this.members;
                if (!includeDeceased) {
                    members = members.filter(m => m.status === 'living');
                }

                const maxLevel = Math.max(...members.map(m => this.getLevel(m.id)), 0);
                
                // Generate HTML content
                const genNames = ['Pertama (Moyang)', 'Kedua (Kakek/Nenek)', 'Ketiga (Orang Tua)', 'Keempat (Anak)', 'Kelima (Cucu)', 'Keenam (Cicit)'];
                
                let html = `
                    <div class="pdf-page" id="pdf-page">
                        <div class="pdf-timestamp">Dokumen ini digenerate pada: ${new Date().toLocaleString('id-ID', {
                            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        })}</div>
                        
                        <div class="pdf-header">
                            <div class="pdf-title">SILSILAH KELUARGA</div>
                            <div class="pdf-subtitle">Dokumen Nasab dan Hubungan Keluarga</div>
                        </div>

                        <div class="pdf-stats">
                            <div class="pdf-stat-box">
                                <div class="pdf-stat-number">${members.length}</div>
                                <div class="pdf-stat-label">Total Anggota</div>
                            </div>
                            <div class="pdf-stat-box">
                                <div class="pdf-stat-number">${maxLevel + 1}</div>
                                <div class="pdf-stat-label">Jumlah Generasi</div>
                            </div>
                            <div class="pdf-stat-box">
                                <div class="pdf-stat-number">${members.filter(m => m.status === 'living').length}</div>
                                <div class="pdf-stat-label">Masih Hidup</div>
                            </div>
                        </div>

                        <div class="pdf-family-tree">
                `;

                // Group by generations
                const generations = {};
                members.forEach(member => {
                    const level = this.getLevel(member.id);
                    if (!generations[level]) generations[level] = [];
                    generations[level].push(member);
                });

                Object.keys(generations).sort((a, b) => a - b).forEach(level => {
                    const genMembers = generations[level];
                    const genTitle = genNames[level] || `Ke-${parseInt(level) + 1}`;
                    
                    html += `
                        <div class="pdf-generation">
                            <div class="pdf-gen-title">
                                <i class="fas fa-layer-group"></i>
                                Generasi ${genTitle}
                            </div>
                            <div class="pdf-members">
                    `;
                    
                    genMembers.forEach(member => {
                        const photoUrl = member.photo || `https://i.pravatar.cc/150?u=${member.id}`;
                        const genderBadge = member.gender === 'male' ? 
                            '<span class="pdf-badge pdf-badge-male">Laki-laki</span>' : 
                            '<span class="pdf-badge pdf-badge-female">Perempuan</span>';
                        const statusBadge = member.status === 'deceased' ? 
                            '<span class="pdf-badge pdf-badge-deceased">Alm</span>' : '';
                        
                        html += `
                            <div class="pdf-member-card">
                                ${includePhotos ? `<img src="${photoUrl}" class="pdf-member-avatar" alt="${member.name}">` : ''}
                                <div class="pdf-member-info">
                                    <h4>${member.name}</h4>
                                    <p>Lahir: ${member.birthYear || '-'}</p>
                                    ${member.notes ? `<p style="font-style: italic; color: #888;">${member.notes}</p>` : ''}
                                    <div style="margin-top: 6px;">
                                        ${genderBadge}
                                        ${statusBadge}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                });

                html += `
                        </div>
                        <div style="margin-top: 30px; padding: 15px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb;">
                            <h4 style="font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #374151;">
                                <i class="fas fa-sitemap" style="margin-right: 8px;"></i>Struktur Pohon Keluarga
                            </h4>
                            <p style="font-size: 11px; color: #6b7280; line-height: 1.5;">
                                Dokumen ini menampilkan silsilah keluarga yang tersusun berdasarkan generasi.
                            </p>
                        </div>
                        <div class="pdf-footer">
                            <p>Generated by Pohon Nasab Application | &copy; 2026</p>
                            <p style="font-size: 9px; margin-top: 5px;">Dokumen ini bersifat pribadi dan rahasia</p>
                        </div>
                    </div>
                `;

                const containerId = this.isMobile ? 'pdf-preview-content-mobile' : 'pdf-preview-content-desktop';
                document.getElementById(containerId).innerHTML = html;
            }

            generatePDF(platform) {
                const element = document.getElementById('pdf-page');
                const opt = {
                    margin: 0,
                    filename: `silsilah-keluarga-${new Date().toISOString().split('T')[0]}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        letterRendering: true
                    },
                    jsPDF: { 
                        unit: 'mm', 
                        format: 'a4', 
                        orientation: 'portrait',
                        compress: true
                    },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                const btn = platform === 'mobile' ? 
                    document.querySelector('#pdf-modal-mobile button[onclick*="generatePDF"]') :
                    document.querySelector('#pdf-modal-desktop button[onclick*="generatePDF"]');
                    
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                btn.disabled = true;

                html2pdf().set(opt).from(element).save().then(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert('PDF berhasil didownload!');
                }).catch(err => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert('Gagal generate PDF: ' + err.message);
                });
            }

            exportData() {
                const dataStr = JSON.stringify(this.members, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `pohon-nasab-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            }

            importData(input) {
                const file = input.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        this.members = JSON.parse(e.target.result);
                        this.saveToStorage();
                        this.render();
                        this.updateStats();
                        alert('Data berhasil diimport!');
                    } catch (err) {
                        alert('File tidak valid!');
                    }
                };
                reader.readAsText(file);
                input.value = '';
            }
        }

        // Initialize app
        const app = new FamilyTreeApp();
    </script>
</body>
</html>
